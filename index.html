<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة الدحيح التعليمية | رحلة من ميح لـ دحيح</title>

<link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: 'Readex Pro', sans-serif; }

/* خلفية أنعم */
.bg-animated-gradient {
    background: linear-gradient(135deg, #070b19, #0f172a, #070b19, #1e1b4b);
    background-size: 300% 300%;
    animation: gradientMove 20s ease-in-out infinite;
}
@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* دخول أنعم */
@keyframes customFadeUp {
    from { opacity: 0; transform: translateY(30px) scale(.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

.animate-fade-up {
    opacity: 0;
    animation: customFadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

/* float أهدأ */
@keyframes floatSlow {
    0%,100% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
}

.animate-float-1 { animation: floatSlow 10s ease-in-out infinite; }
.animate-float-2 { animation: floatSlow 14s ease-in-out infinite; }

.delay-100 { animation-delay: .1s; }
.delay-300 { animation-delay: .3s; }
.delay-500 { animation-delay: .5s; }
.delay-700 { animation-delay: .7s; }

/* تأثير أزرار احترافي */
.btn-glass {
    backdrop-filter: blur(12px);
    transition: all .35s cubic-bezier(.16,1,.3,1);
}
.btn-glass:hover {
    transform: scale(1.08);
}
</style>
</head>

<body class="bg-animated-gradient text-white min-h-screen flex flex-col justify-between overflow-x-hidden p-6">

<nav class="w-full flex justify-between items-center py-6 max-w-7xl mx-auto animate-fade-up">
<div class="text-3xl font-extrabold text-yellow-500 tracking-tight">
الدحيح<span class="text-white">.</span>
</div>

<div class="hidden md:flex gap-8 text-sm text-gray-300">
<a href="#" class="hover:text-yellow-500 transition">الرئيسية</a>
<a href="#" class="hover:text-yellow-500 transition">بنك الأسئلة</a>
<a href="#" class="hover:text-yellow-500 transition">المناهج</a>
</div>

<a href="#" class="bg-yellow-500 text-black px-6 py-2.5 rounded-full font-bold hover:bg-yellow-400 transition transform hover:scale-105">
التسجيل
</a>
</nav>

<main class="relative flex-grow flex flex-col items-center justify-center text-center px-4">

<div class="absolute top-0 left-[-15%] w-96 h-96 bg-blue-600/10 rounded-full blur-[140px] animate-float-1"></div>
<div class="absolute bottom-0 right-[-15%] w-96 h-96 bg-indigo-600/10 rounded-full blur-[140px] animate-float-2"></div>

<div class="relative z-10 max-w-5xl w-full flex flex-col items-center pt-10">

<h1 class="text-6xl md:text-8xl font-black mb-10 animate-fade-up delay-100">
<span class="text-yellow-500">الدحيح</span> في التاريخ
</h1>

<p class="text-2xl md:text-3xl text-gray-400 max-w-3xl mb-16 animate-fade-up delay-300">
رحلة من <span class="text-white">ميح</span> لـ <span class="text-white">دحيح</span>
</p>

<div class="flex flex-col sm:flex-row gap-5 w-full max-w-xl animate-fade-up delay-500 mb-20">
<a href="/app" class="w-full text-center px-8 py-4 bg-white text-black font-bold rounded-2xl hover:bg-yellow-500 transition transform hover:scale-105">
ابدأ التعلم الآن
</a>

<a href="/app" class="w-full text-center px-8 py-4 border border-gray-700 rounded-2xl hover:border-white hover:bg-white/5 transition transform hover:scale-105">
جرب بنك الأسئلة
</a>
</div>

<div class="w-full flex flex-col items-center animate-fade-up delay-700 mt-10">
<p class="text-sm text-gray-500 mb-6">أو سجل دخولك الفوري للمتابعة:</p>

<div class="flex gap-6">

<!-- Google -->
<button onclick="realGoogleLogin()"
class="btn-glass p-5 rounded-full border border-white/10 bg-white/5 hover:border-white hover:bg-white/10 shadow-lg">
<svg class="w-8 h-8" viewBox="0 0 24 24">
<path fill="#4285F4" d="M23.745 12.27c0-.7-.06-1.4-.19-2.07H12v3.92h6.61c-.29 1.5-1.14 2.78-2.4 3.63v3h3.84c2.24-2.06 3.53-5.1 3.53-8.48z"/>
<path fill="#34A853" d="M12 24c3.24 0 5.95-1.08 7.93-2.91l-3.84-3c-1.07.72-2.45 1.16-4.09 1.16-3.15 0-5.81-2.13-6.76-5.01H1.36v3.1A11.99 11.99 0 0 0 12 24z"/>
<path fill="#FBBC05" d="M5.24 14.24a7.2 7.2 0 0 1 0-4.48V6.66H1.36a11.99 11.99 0 0 0 0 10.68l3.88-3.1z"/>
<path fill="#EA4335" d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C17.95 1.19 15.24 0 12 0 7.31 0 3.28 2.68 1.36 6.66l3.88 3.1c.95-2.88 3.61-5.01 6.76-5.01z"/>
</svg>
</button>

<!-- جوال -->
<a href="/login"
class="btn-glass p-5 rounded-full border border-white/10 bg-white/5 hover:border-white hover:bg-white/10 shadow-lg flex items-center justify-center">

<svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
d="M3 5a2 2 0 012-2h3l2 5-2 1a11 11 0 005 5l1-2 5 2v3a2 2 0 01-2 2h-1C9.163 19 5 14.837 5 9V8a2 2 0 01-2-2z"/>
</svg>

</a>

</div>
</div>

</div>
</main>

<footer class="w-full text-center py-6 border-t border-white/5 text-gray-600 text-sm">
جميع الحقوق محفوظة لمنصة الدحيح التعليمية © 2026
</footer>

<script>
function realGoogleLogin() {
const clientId = "YOUR_GOOGLE_CLIENT_ID";
const redirectUri = window.location.origin;

const url = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${clientId}&redirect_uri=${redirectUri}&response_type=token&scope=email profile`;

window.open(url, "Google Login", "width=500,height=600");
}
</script>

</body>
</html>
