<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الدحيح التعليمية | رحلة من ميح لـ دحيح</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            font-family: 'Readex Pro', sans-serif;
        }

        .bg-animated-gradient {
            background: linear-gradient(135deg, #070b19, #0f172a, #070b19, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes customFadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes floatSlow {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        .animate-fade-up {
            opacity: 0;
            animation: customFadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .animate-float-1 { animation: floatSlow 8s ease-in-out infinite; }
        .animate-float-2 { animation: floatSlow 12s ease-in-out infinite; animation-delay: 2s; }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            display: none;
            z-index: 9999;
        }
    </style>
</head>

<body class="bg-animated-gradient text-white min-h-screen flex flex-col justify-between p-6">

<!-- Toast بدل "site says" -->
<div id="toast" class="toast"></div>

<nav class="w-full flex justify-between items-center py-6 max-w-7xl mx-auto animate-fade-up">
    <div class="text-3xl font-extrabold text-yellow-500">
        الدحيح<span class="text-white">.</span>
    </div>

    <div class="hidden md:flex gap-8 text-sm text-gray-300">
        <a href="#">الرئيسية</a>
        <a href="#">بنك الأسئلة</a>
        <a href="#">المناهج</a>
    </div>

    <div class="flex gap-3 items-center">
        <!-- أيقونة الجوال الجديدة -->
        <a href="/public/login.html" class="p-2 rounded-full border border-white/10 hover:bg-white/10 transition">
            <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24">
                <path d="M7 2h10a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm5 18a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z"/>
            </svg>
        </a>

        <a href="/public/login.html" class="bg-yellow-500 text-black px-6 py-2 rounded-full font-bold">
            التسجيل
        </a>
    </div>
</nav>

<main class="text-center">
    <h1 class="text-6xl font-black text-yellow-500">الدحيح في التاريخ</h1>
    <p class="text-gray-400 mt-4">رحلة من ميح لـ دحيح</p>
</main>

<script>
    // بدل alert "site says"
    function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.style.display = "block";

        setTimeout(() => {
            toast.style.display = "none";
        }, 3000);
    }

    // تحويل أي alert إلى رسالة داخل الشاشة
    window.alert = showToast;
</script>

</body>
</html>
