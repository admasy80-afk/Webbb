<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الدحيح التعليمية | رحلة من ميح لـ دحيح</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            font-family: 'Readex Pro', sans-serif;
        }

        .bg-animated-gradient {
            background: linear-gradient(135deg, #070b19, #0f172a, #070b19, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes customFadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes floatSlow {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        .animate-fade-up {
            opacity: 0;
            animation: customFadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .animate-float-1 { animation: floatSlow 8s ease-in-out infinite; }
        .animate-float-2 { animation: floatSlow 12s ease-in-out infinite; animation-delay: 2s; }

        .delay-100 { animation-delay: 0.1s; }
        .delay-300 { animation-delay: 0.3s; }
        .delay-500 { animation-delay: 0.5s; }
    </style>
</head>
<body class="bg-animated-gradient text-white min-h-screen flex flex-col justify-between selection:bg-yellow-500 selection:text-black overflow-x-hidden p-6">

    <nav class="w-full flex justify-between items-center py-6 max-w-7xl mx-auto animate-fade-up">
        <div class="text-3xl font-extrabold text-yellow-500 tracking-tight">
            الدحيح<span class="text-white">.</span>
        </div>
        <div class="hidden md:flex gap-8 text-sm font-medium text-gray-300">
            <a href="#" class="hover:text-yellow-500 transition-all duration-300 transform hover:scale-105">الرئيسية</a>
            <a href="#" class="hover:text-yellow-500 transition-all duration-300 transform hover:scale-105">بنك الأسئلة</a>
            <a href="#" class="hover:text-yellow-500 transition-all duration-300 transform hover:scale-105">المناهج</a>
        </div>
        <a href="/public/login.html" class="bg-yellow-500 text-black px-6 py-2.5 rounded-full font-bold hover:bg-yellow-400 transition-all duration-500 transform hover:scale-105 hover:shadow-[0_0_20px_rgba(234,179,8,0.4)] inline-block">
            دخول الطلاب
        </a>
    </nav>

    <main class="relative flex-grow flex flex-col items-center justify-center text-center px-4 overflow-hidden mb-24">
        <div class="absolute top-0 left-[-15%] w-96 h-96 bg-blue-600/10 rounded-full blur-[120px] animate-float-1 pointer-events-none"></div>
        <div class="absolute bottom-0 right-[-15%] w-96 h-96 bg-indigo-600/10 rounded-full blur-[120px] animate-float-2 pointer-events-none"></div>

        <div class="relative z-10 max-w-5xl my-auto w-full flex flex-col items-center">
            
            <h1 class="text-5xl md:text-8xl font-black mb-6 leading-tight animate-fade-up delay-100 tracking-tight">
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-yellow-600">الدحيح</span> في التاريخ
            </h1>
            
            <p class="text-2xl md:text-3xl text-gray-400 font-extralight max-w-3xl mx-auto mb-12 leading-relaxed animate-fade-up delay-300">
                رحلة من <span class="text-white font-medium">ميح</span> لـ <span class="text-white font-medium">دحيح</span>
            </p>

            <div class="flex flex-col sm:flex-row gap-5 w-full max-w-xl justify-center items-center animate-fade-up delay-500 mb-12">
                <a href="/app" class="w-full sm:w-1/2 text-center px-8 py-4 bg-white text-black font-bold rounded-2xl hover:bg-yellow-500 hover:text-black transition-all duration-500 transform hover:scale-105 hover:shadow-[0_10px_30px_rgba(255,255,255,0.1)]">
                    ابدأ التعلم الآن
                </a>
                <a href="/app" class="w-full sm:w-1/2 text-center px-8 py-4 border-2 border-gray-800 font-bold rounded-2xl hover:border-white hover:bg-white/5 transition-all duration-500 transform hover:scale-105">
                    جرب بنك الأسئلة
                </a>
            </div>

        </div>
    </main>

    <footer class="w-full text-center py-10 border-t border-white/5 text-gray-600 text-sm mt-auto">
        <p class="text-sm text-gray-700">جميع الحقوق محفوظة لمنصة الدحيح التعليمية &copy; 2026</p>
    </footer>

</body>
</html>
