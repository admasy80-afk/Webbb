<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الدحيح التعليمية | رحلة من ميح لـ دحيح</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            font-family: 'Readex Pro', sans-serif;
        }

        .bg-animated-gradient {
            background: linear-gradient(135deg, #070b19, #0f172a, #070b19, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes customFadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes floatSlow {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        .animate-fade-up {
            opacity: 0;
            animation: customFadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .animate-float-1 { animation: floatSlow 8s ease-in-out infinite; }
        .animate-float-2 { animation: floatSlow 12s ease-in-out infinite; animation-delay: 2s; }

        .delay-100 { animation-delay: 0.1s; }
        .delay-300 { animation-delay: 0.3s; }
        .delay-500 { animation-delay: 0.5s; }
        .delay-700 { animation-delay: 0.7s; }
    </style>
</head>
<body class="bg-animated-gradient text-white min-h-screen flex flex-col justify-between selection:bg-yellow-500 selection:text-black overflow-x-hidden p-6">

    <nav class="w-full flex justify-between items-center py-6 max-w-7xl mx-auto animate-fade-up">
        <div class="text-3xl font-extrabold text-yellow-500 tracking-tight">
            الدحيح<span class="text-white">.</span>
        </div>

        <div class="hidden md:flex gap-8 text-sm font-medium text-gray-300">
            <a href="#" class="hover:text-yellow-500 transition-all duration-300 transform hover:scale-105">الرئيسية</a>
            <a href="#" class="hover:text-yellow-500 transition-all duration-300 transform hover:scale-105">بنك الأسئلة</a>
            <a href="#" class="hover:text-yellow-500 transition-all duration-300 transform hover:scale-105">المناهج</a>
        </div>
        
        <a href="/public/login.html" class="bg-yellow-500 text-black px-6 py-2.5 rounded-full font-bold hover:bg-yellow-400 transition-all duration-500 transform hover:scale-105 hover:shadow-[0_0_20px_rgba(234,179,8,0.4)] inline-block">
            التسجيل 
        </a>
    </nav>

    <main class="relative flex-grow flex flex-col items-center justify-center text-center px-4 overflow-hidden">

        <div class="absolute bottom-0 right-[-15%] w-96 h-96 bg-indigo-600/10 rounded-full blur-[120px] animate-float-2 pointer-events-none"></div>

        <div class="relative z-10 max-w-5xl my-auto w-full flex flex-col items-center pt-10">

                <span class="text-yellow-500">الدحيح</span> في التاريخ
            </h1>
            
            <p class="text-2xl md:text-3xl text-gray-400 font-extralight max-w-3xl mx-auto mt-4 mb-16 leading-relaxed animate-fade-up delay-300">
                رحلة من <span class="text-white font-medium">ميح</span> لـ <span class="text-white font-medium">دحيح</span>
            </p>

            <div class="flex flex-col sm:flex-row gap-5 w-full max-w-xl justify-center items-center animate-fade-up delay-500 mb-16">

                <div class="flex flex-row gap-6 justify-center items-center">

                    <!-- Google -->

                        <svg class="w-8 h-8" viewBox="0 0 24 24">

                            <path fill="#EA4335" d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C17.95 1.19 15.24 0 12 0 7.31 0 3.28 2.68 1.36 6.66l3.88 3.1c.95-2.88 3.61-5.01 6.76-5.01z"/>

                        <svg class="w-8 h-8 fill-current text-white" viewBox="0 0 24 24">
                            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.13.67-2.85 1.51-.62.73-1.16 1.87-1.01 2.98 1.1.09 2.15-.55 2.87-1.43z"/>

        </div>
    </main>

    <footer class="w-full text-center py-6 border-t border-white/5 text-gray-600 text-sm mt-auto">
        <p class="text-sm text-gray-700">جميع الحقوق محفوظة لمنصة الدحيح التعليمية &copy; 2026</p>
    </footer>

</body>
</html>
