<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
</head>
<body><h2 style="text-align:center;margin-top:50px;">Proxy Test</h2><div style="text-align:center;margin-top:20px;">
    <input id="proxy-address" placeholder="اكتب رابط أو بحث..." style="width:300px;height:35px;">
    <button onclick="launchProxy()">Go</button>
</div><!-- 🔥 ملفات UV الصحيحة --><script src="/uv/uv.bundle.js"></script><script src="/uv/uv.config.js"></script><script>
async function launchProxy() {
    const input = document.getElementById('proxy-address');
    const url = input.value.trim();
    if (!url) return;

    if (!window.__uv$config) {
        alert("UV CONFIG NOT LOADED ❌");
        return;
    }

    try {
        // ✅ تسجيل Service Worker الصحيح
        await navigator.serviceWorker.register('/uv/uv.sw.js', {
            scope: __uv$config.prefix
        });

        let targetUrl = url;

        if (!targetUrl.startsWith('http')) {
            if (targetUrl.includes('.') && !targetUrl.includes(' ')) {
                targetUrl = 'https://' + targetUrl;
            } else {
                targetUrl = 'https://www.google.com/search?q=' + encodeURIComponent(targetUrl);
            }
        }

        // ✅ الانطلاق
        location.href = __uv$config.prefix + __uv$config.encodeUrl(targetUrl);

    } catch (err) {
        console.error(err);
        alert("❌ Service Worker فشل");
    }
}
</script></body>
</html>
