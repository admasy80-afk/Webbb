    <script>
        (function() {
            try {
                const savedUserStr = localStorage.getItem('userData') || localStorage.getItem('dahih_user');
                if (savedUserStr) {
                    const user = JSON.parse(savedUserStr);
                    if (user && user.role) {
                        const redirectUrl = (user.role === 'dev' || user.role === 'owner') ? '/admin.html' : '/student/';
                        window.location.replace(redirectUrl);
                    }
                }
            } catch (e) {} 
        })();
    </script>

        .bg-animated-gradient {

            animation: gradientMove 15s ease infinite;

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes customFadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            80% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }

        @keyframes floatSlow {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        @keyframes textShine {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 10px rgba(234,179,8,0.3); }

        .animate-slide-down { animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-fade-up { opacity: 0; animation: customFadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-pop-in { animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-float-1 { animation: floatSlow 8s ease-in-out infinite; }
        .animate-float-2 { animation: floatSlow 12s ease-in-out infinite; animation-delay: 2s; }

        .text-shine {
            background: linear-gradient(to right, #eab308 20%, #fff 40%, #eab308 60%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: textShine 4s linear infinite;
        }

        .pulse-glow { animation: pulseGlow 2s infinite; }

        .delay-100 { animation-delay: 0.1s; }

        .delay-400 { animation-delay: 0.4s; }
