<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: arial, sans-serif;
            background: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 10px 30px;
            gap: 15px;
        }

        .header a {
            font-size: 13px;
            color: rgba(0,0,0,.87);
            text-decoration: none;
            padding: 8px 12px;
        }

        .header a:hover {
            text-decoration: underline;
        }

        .header-right {
            margin-right: auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .gmail-link, .images-link {
            font-size: 13px;
            color: rgba(0,0,0,.87);
            text-decoration: none;
            padding: 8px 12px;
        }

        .gmail-link:hover, .images-link:hover {
            text-decoration: underline;
        }

        .apps-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .apps-btn:hover {
            background: rgba(60,64,67,.08);
        }

        .apps-icon {
            width: 24px;
            height: 24px;
        }

        .signin-btn {
            background: #1a73e8;
            color: #fff;
            border: none;
            padding: 9px 23px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
        }

        .signin-btn:hover {
            background: #1b66c9;
            box-shadow: 0 1px 3px 1px rgba(66,64,67,.15), 0 1px 2px 0 rgba(60,64,67,.3);
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 100px;
        }

        /* Google Logo */
        .logo {
            margin-bottom: 24px;
        }

        .logo svg {
            width: 272px;
            height: 92px;
        }

        /* Search Box */
        .search-container {
            width: 100%;
            max-width: 584px;
            padding: 0 20px;
        }

        .search-box {
            display: flex;
            align-items: center;
            width: 100%;
            height: 44px;
            background: #fff;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            padding: 0 14px;
            transition: box-shadow 0.2s;
        }

        .search-box:hover,
        .search-box:focus-within {
            box-shadow: 0 1px 6px rgba(32,33,36,.28);
            border-color: rgba(223,225,229,0);
        }

        .search-icon {
            width: 20px;
            height: 20px;
            margin-left: 13px;
        }

        .search-icon svg {
            width: 20px;
            height: 20px;
            color: #9aa0a6;
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            background: transparent;
            padding: 0 10px;
            direction: rtl;
        }

        .voice-btn, .camera-btn {
            width: 24px;
            height: 24px;
            border: none;
            background: transparent;
            cursor: pointer;
            margin: 0 4px;
            padding: 0;
        }

        .voice-btn svg, .camera-btn svg {
            width: 24px;
            height: 24px;
        }

        /* Buttons */
        .buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 18px;
        }

        .search-btn {
            background: #f8f9fa;
            border: 1px solid #f8f9fa;
            border-radius: 4px;
            color: #3c4043;
            font-size: 14px;
            padding: 0 16px;
            height: 36px;
            cursor: pointer;
            min-width: 54px;
        }

        .search-btn:hover {
            box-shadow: 0 1px 1px rgba(0,0,0,.1);
            background: #f8f9fa;
            border: 1px solid #dadce0;
            color: #202124;
        }

        /* Language Options */
        .language {
            margin-top: 18px;
            font-size: 13px;
            color: #4d5156;
        }

        .language span {
            margin-left: 3px;
        }

        .language a {
            color: #1a0dab;
            text-decoration: none;
            margin: 0 5px;
        }

        .language a:hover {
            text-decoration: underline;
        }

        /* Footer */
        .footer {
            background: #f2f2f2;
            border-top: 1px solid #dadce0;
        }

        .footer-top {
            padding: 15px 30px;
            color: rgba(0,0,0,.54);
            font-size: 15px;
            border-bottom: 1px solid #dadce0;
        }

        .footer-bottom {
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
            font-size: 14px;
        }

        .footer-links {
            display: flex;
            gap: 20px;
        }

        .footer-links a {
            color: #70757a;
            text-decoration: none;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 650px) {
            .header {
                padding: 10px 15px;
            }

            .footer-bottom {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-right">
            <a href="#" class="gmail-link">Gmail</a>
            <a href="#" class="images-link">الصور</a>
            <button class="apps-btn" title="تطبيقات Google">
                <svg class="apps-icon" focusable="false" viewBox="0 0 24 24">
                    <path fill="#5f6368" d="M6,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM6,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM6,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM16,6c0,1.1 0.9,2 2,2s2,-0.9 2,-2 -0.9,-2 -2,-2 -2,0.9 -2,2zM12,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2z"></path>
                </svg>
            </button>
            <a href="#" class="signin-btn">تسجيل الدخول</a>
        </div>
    </header>

    <main class="main">
        <div class="logo">
            <svg viewBox="0 0 272 92" width="272" height="92" xmlns="http://www.w3.org/2000/svg">
                <path fill="#4285F4" d="M115.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18C71.25 34.32 81.24 25 93.5 25s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44S80.99 39.2 80.99 47.18c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z"/>
                <path fill="#EA4335" d="M163.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18c0-12.85 9.99-22.18 22.25-22.18s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44s-12.51 5.46-12.51 13.44c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z"/>
                <path fill="#FBBC05" d="M209.75 26.34v39.82c0 16.38-9.66 23.07-21.08 23.07-10.75 0-17.22-7.19-19.66-13.07l8.48-3.53c1.51 3.61 5.21 7.87 11.17 7.87 7.31 0 11.84-4.51 11.84-13v-3.19h-.34c-2.18 2.69-6.38 5.04-11.68 5.04-11.09 0-21.25-9.66-21.25-22.09 0-12.52 10.16-22.26 21.25-22.26 5.29 0 9.49 2.35 11.68 4.96h.34v-3.61h9.25zm-8.56 20.92c0-7.81-5.21-13.52-11.84-13.52-6.72 0-12.35 5.71-12.35 13.52 0 7.73 5.63 13.36 12.35 13.36 6.63 0 11.84-5.63 11.84-13.36z"/>
                <path fill="#4285F4" d="M225 3v65h-9.5V3h9.5z"/>
                <path fill="#34A853" d="M262.02 54.48l7.56 5.04c-2.44 3.61-8.32 9.83-18.48 9.83-12.6 0-22.01-9.74-22.01-22.18 0-13.19 9.49-22.18 20.92-22.18 11.51 0 17.14 9.16 18.98 14.11l1.01 2.52-29.65 12.28c2.27 4.45 5.8 6.72 10.75 6.72 4.96 0 8.4-2.44 10.92-6.14zm-23.27-7.98l19.82-8.23c-1.09-2.77-4.37-4.7-8.23-4.7-4.95 0-11.84 4.37-11.59 12.93z"/>
                <path fill="#EA4335" d="M35.29 41.41V32H67c.31 1.64.47 3.58.47 5.68 0 7.06-1.93 15.79-8.15 22.01-6.05 6.3-13.78 9.66-24.02 9.66C16.32 69.35.36 53.89.36 34.91.36 15.93 16.32.47 35.3.47c10.5 0 17.98 4.12 23.6 9.49l-6.64 6.64c-4.03-3.78-9.49-6.72-16.97-6.72-13.86 0-24.7 11.17-24.7 25.03 0 13.86 10.84 25.03 24.7 25.03 8.99 0 14.11-3.61 17.39-6.89 2.66-2.66 4.41-6.46 5.1-11.65l-22.49.01z"/>
            </svg>
        </div>

        <div class="search-container">
            <form id="proxy-form" class="search-box">
                <div class="search-icon">
                    <svg focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path fill="#9aa0a6" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path>
                    </svg>
                </div>
                <input id="proxy-address" type="text" class="search-input" title="بحث" autocomplete="off">
                <button type="button" class="camera-btn" title="البحث بالصور">
                    <svg viewBox="0 0 192 192" width="24" height="24">
                        <rect fill="none" height="192" width="192"></rect>
                        <g>
                            <circle fill="#34a853" cx="144.07" cy="144" r="16"></circle>
                            <circle fill="#4285f4" cx="96.07" cy="104" r="24"></circle>
                            <path fill="#ea4335" d="M24,135.2c0,18.11,14.69,32.8,32.8,32.8H96v-16l-40.1-0.1c-8.8,0-15.9-8.19-15.9-17.9v-18H24V135.2z"></path>
                            <path fill="#fbbc05" d="M168,72.8c0-18.11-14.69-32.8-32.8-32.8H116l20,16c8.8,0,16,8.29,16,18v30h16V72.8z"></path>
                            <path fill="#4285f4" d="M112,24l-32,0L68,40H56.8C38.69,40,24,54.69,24,72.8V92h16V74c0-9.71,7.2-18,16-18h80L112,24z"></path>
                        </g>
                    </svg>
                </button>
                <button type="button" class="voice-btn" title="البحث الصوتي">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="#4285f4" d="M12 15c1.66 0 3-1.31 3-2.97V5.97C15 4.31 13.66 3 12 3S9 4.31 9 5.97v6.06C9 13.69 10.34 15 12 15z"></path>
                        <path fill="#34a853" d="M11 18.08h2V22h-2z"></path>
                        <path fill="#fbbc05" d="M7.05 16.87c-1.27-1.33-2.05-3.11-2.05-5.07h2c0 1.45.56 2.77 1.47 3.77l-1.42 1.3z"></path>
                        <path fill="#ea4335" d="M12 16.93a4.97 4.97 0 0 1-3.54-1.55l-1.41 1.49A6.96 6.96 0 0 0 12 18.93V16.93z"></path>
                        <path fill="#4285f4" d="M14.54 15.38A4.97 4.97 0 0 1 12 16.93v2c1.91 0 3.66-.77 4.95-2.01l-1.41-1.54z"></path>
                        <path fill="#34a853" d="M17 11.8c0 1.96-.78 3.74-2.05 5.07l1.42 1.3A6.96 6.96 0 0 0 19 11.8h-2z"></path>
                    </svg>
                </button>
            </form>

            <div class="buttons">
                <button type="button" id="search-go" class="search-btn">بحث Google</button>
                <button type="button" id="lucky-go" class="search-btn">ضربة حظ</button>
            </div>

            <div class="language">
                <span>Google متوفّر بـ:</span>
                <a href="#">English</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-top">
            المملكة العربية السعودية
        </div>
        <div class="footer-bottom">
            <div class="footer-links">
                <a href="#">الإعلانات</a>
                <a href="#">للأعمال</a>
                <a href="#">كيف يعمل البحث</a>
            </div>
            <div class="footer-links">
                <a href="#">الخصوصية</a>
                <a href="#">البنود</a>
                <a href="#">الإعدادات</a>
            </div>
        </div>
    </footer>

    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv.config.js"></script>
    <script>
        const form = document.getElementById('proxy-form');
        const input = document.getElementById('proxy-address');
        const searchBtn = document.getElementById('search-go');
        const luckyBtn = document.getElementById('lucky-go');

        async function launchProxy(event) {
            if (event) event.preventDefault();
            
            const url = input.value.trim();
            if (!url) return;

            try {
                // 1. تسجيل المحرك السري في الخلفية
                await navigator.serviceWorker.register('/sw.js', {
                    scope: __uv$config.prefix
                });

                // 2. تحليل النص (هل هو رابط ولا بحث عادي؟)
                let targetUrl = url;
                if (!targetUrl.startsWith('http')) {
                    // لو فيه نقطة ومفيش مسافات (زي youtube.com) نعتبره رابط
                    if (targetUrl.includes('.') && !targetUrl.includes(' ')) {
                        targetUrl = 'https://' + targetUrl;
                    } else {
                        // غير كده نبعته لمحرك بحث جوجل
                        targetUrl = 'https://www.google.com/search?q=' + encodeURIComponent(targetUrl);
                    }
                }

                // 3. التشفير والانطلاق
                window.location.href = __uv$config.prefix + __uv$config.encodeUrl(targetUrl);
            } catch (err) {
                alert("⛔ المتصفح مانع البروكسي!\nتأكد إنك مفعل الـ insecure origins في chrome://flags");
            }
        }

        // ربط الإكواد بالأزرار والإنتر
        form.addEventListener('submit', launchProxy);
        searchBtn.addEventListener('click', launchProxy);
        luckyBtn.addEventListener('click', launchProxy);
    </script>
</body>
</html>
