<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>لوحة الطالب | منصة الدحيح</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Readex Pro', sans-serif; 
            background-color: #070b19; 
        }
        
        /* 🔥 الأنيميشن الجديد الناعم جداً باستخدام GPU 🔥 */
        @keyframes smoothBlobMove1 {
            0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
            50% { transform: translate3d(-30px, 40px, 0) scale(1.1); }
        }
        @keyframes smoothBlobMove2 {
            0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
            50% { transform: translate3d(30px, -40px, 0) scale(1.1); }
        }

        .blob-blue {
            animation: smoothBlobMove1 15s ease-in-out infinite;
            will-change: transform;
        }
        
        .blob-yellow {
            animation: smoothBlobMove2 18s ease-in-out infinite;
            will-change: transform;
        }
        
        /* البانل الزجاجي (تم تخفيفه ليكون أسرع على الجوال) */
        .glass-panel { 
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            /* إجبار المتصفح على معالجة العنصر كطبقة منفصلة */
            transform: translateZ(0);
        }
        
        .card-hover { transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease; }
        .card-hover:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 12px 24px rgba(0,0,0,0.4); 
            border-color: rgba(255, 255, 255, 0.1); 
        }
        
        /* تنسيقات الراديو */
        .quiz-option input[type="radio"]:checked + div { 
            border-color: #eab308; 
            background-color: rgba(234, 179, 8, 0.1); 
        }
        
        /* حركات السحب والإفلات */
        .section-content { transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease; overflow: hidden; opacity: 1; }
        .section-content.collapsed { max-height: 0 !important; opacity: 0; padding-top: 0; padding-bottom: 0; border: none; }
        .icon-rotate { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .icon-rotate.collapsed { transform: rotate(180deg); }

        /* أنيميشن شاشة النتيجة */
        @keyframes ultraSmoothPop {
            0% { transform: scale(0.9) translate3d(0, 20px, 0); opacity: 0; }
            100% { transform: scale(1) translate3d(0, 0, 0); opacity: 1; }
        }
        @keyframes ultraSmoothSlideUp {
            0% { transform: translate3d(0, 20px, 0); opacity: 0; }
            100% { transform: translate3d(0, 0, 0); opacity: 1; }
        }
        @keyframes softFloat {
            0%, 100% { transform: translate3d(0, 0, 0); }
            50% { transform: translate3d(0, -8px, 0); }
        }
        
        .animate-pop-in { 
            animation: ultraSmoothPop 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
            will-change: transform, opacity;
        }
        .animate-slide-up { 
            opacity: 0; 
            animation: ultraSmoothSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
            will-change: transform, opacity;
        }
        .animate-float {
            animation: softFloat 4s ease-in-out infinite;
            will-change: transform;
        }
        
        .delay-100 { animation-delay: 100ms; }
        .delay-150 { animation-delay: 150ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-250 { animation-delay: 250ms; }
        .delay-300 { animation-delay: 300ms; }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
