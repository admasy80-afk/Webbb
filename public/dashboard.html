<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>لوحة الطالب | منصة الدحيح</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Readex Pro', sans-serif; }
        .bg-animated-gradient {
            background: linear-gradient(135deg, #070b19, #0f172a, #070b19, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .glass-panel { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(12px); 
        }
        
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(234, 179, 8, 0.1);
            border-color: rgba(234, 179, 8, 0.3);
        }
        .transition-all { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-animated-gradient text-white min-h-screen flex flex-col selection:bg-yellow-500 selection:text-black">

    <nav class="w-full glass-panel sticky top-0 z-50 border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 md:px-8 py-4 flex justify-between items-center">
            <div class="text-2xl font-black text-yellow-500 tracking-tight">الدحيح<span class="text-white">.</span></div>
            <button onclick="logout()" class="text-xs md:text-sm text-red-400 border border-red-500/30 hover:bg-red-500 hover:text-white px-4 py-2 rounded-xl transition-all font-bold">
                تسجيل الخروج
            </button>
        </div>
    </nav>

    <main class="flex-grow w-full max-w-7xl mx-auto px-4 md:px-8 py-8">
        
        <div class="glass-panel rounded-[2rem] p-8 md:p-10 mb-8 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-64 h-64 bg-yellow-500/10 rounded-full blur-[80px] -translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>
            
            <div class="relative z-10">
                <div class="inline-block bg-yellow-500/10 border border-yellow-500/30 text-yellow-500 text-xs md:text-sm font-bold px-4 py-1.5 rounded-full mb-4">
                    المرحلة: <span id="studentGrade">جاري التحميل...</span>
                </div>
                
                <h1 class="text-4xl md:text-5xl font-black tracking-tight leading-tight">
                    أهلاً بك يا <span id="studentName" class="text-transparent bg-clip-text bg-gradient-to-l from-yellow-300 to-yellow-600">بطل</span>
                </h1>
                <p class="text-gray-400 mt-3 font-light text-sm md:text-base">جاهز لمواصلة التعلم اليوم؟</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

            <div class="lg:col-span-2 space-y-8">
                
                <section>
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-2xl font-bold text-white flex items-center gap-2">
                            أهم النقاط في المنهج
                        </h2>
                    </div>
                    <div id="pointsContainer" class="glass-panel rounded-2xl p-6 border-r-4 border-r-blue-500 min-h-[150px] flex flex-col justify-center">
                        <p class="text-gray-500 text-sm text-center animate-pulse">جاري تحميل النقاط الهامة...</p>
                    </div>
                </section>

                <section>
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-2xl font-bold text-white flex items-center gap-2">
                            أهم الأسئلة (متوقعة)
                        </h2>
                    </div>
                    <div id="questionsContainer" class="space-y-4">
                       <div class="glass-panel rounded-2xl p-8 flex items-center justify-center">
                           <p class="text-gray-500 text-sm animate-pulse">جاري تحميل الأسئلة...</p>
                       </div>
                    </div>
                </section>

            </div>

            <div class="space-y-8">
                
                <section class="glass-panel rounded-3xl p-6 relative overflow-hidden">
                    <h2 class="text-xl font-bold text-white mb-6">مستواك الحالي</h2>

                    <div class="bg-black/30 rounded-2xl p-4 flex items-center justify-between border border-white/5">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-yellow-500 flex items-center justify-center text-black font-black text-lg">
                                👑
                            </div>
                            <div>
                                <h4 class="font-bold text-sm">مجموع النقاط</h4>
                                <p class="text-xs text-green-400">استمر في التقدم!</p>
                            </div>
                        </div>
                        <div class="text-left">
                            <span id="studentPointsDisplay" class="block text-xl font-black text-white">0</span>
                        </div>
                    </div>
                    
                    <button class="w-full mt-5 bg-white/5 hover:bg-white/10 text-gray-400 font-medium py-3 rounded-xl transition-all text-sm border border-white/10 cursor-not-allowed">
                        عرض لوحة الشرف الكاملة
                    </button>
                </section>

                <section class="glass-panel rounded-3xl p-6">
                    <h2 class="text-xl font-bold text-white mb-4">المهام المطلوبة</h2>
                    <div class="space-y-3">
                        <div class="p-4 bg-black/20 rounded-xl text-center">
                            <span class="text-sm text-gray-500">لا توجد مهام مطلوبة حالياً.</span>
                        </div>
                    </div>
                </section>

            </div>

        </div>
    </main>

    <script>
        const userDataStr = localStorage.getItem('dahih_user');
        
        if (!userDataStr) {
            window.location.replace("/logina.html");
        } else {
            const userData = JSON.parse(userDataStr);
            const firstName = userData.name ? userData.name.split(' ')[0] : "يا دحيح";
            
            document.getElementById('studentName').innerText = firstName;
            document.getElementById('studentGrade').innerText = userData.grade || "الصف غير محدد";

            // جلب الداتا المخصصة للدفعة دي من السيرفر
            fetchDashboardData(userData.email, userData.grade);
        }

        async function fetchDashboardData(email, grade) {
            try {
                const res = await fetch('/api/student/dashboard-data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, grade: grade })
                });

                if (res.ok) {
                    const data = await res.json();
                    
                    // 1. تحديث النقاط
                    document.getElementById('studentPointsDisplay').innerText = data.studentPoints || 0;

                    // 2. تحديث النقاط الهامة في المنهج
                    const pContainer = document.getElementById('pointsContainer');
                    if (data.content.points && data.content.points.length > 0) {
                        let pHTML = '<ul class="space-y-4 text-gray-300 text-sm md:text-base font-medium">';
                        data.content.points.forEach(point => {
                            pHTML += `
                            <li class="flex items-start gap-3">
                                <span class="text-blue-400 mt-1">▪</span>
                                <p>${point}</p>
                            </li>`;
                        });
                        pHTML += '</ul>';
                        pContainer.innerHTML = pHTML;
                        pContainer.classList.remove('justify-center');
                    } else {
                        pContainer.innerHTML = '<p class="text-gray-500 text-sm text-center">لم يتم إضافة نقاط هامة لهذه الدفعة بعد.</p>';
                    }

                    // 3. تحديث الأسئلة المتوقعة
                    const qContainer = document.getElementById('questionsContainer');
                    if (data.content.questions && data.content.questions.length > 0) {
                        let qHTML = '';
                        data.content.questions.forEach(q => {
                            qHTML += `
                            <div class="glass-panel rounded-2xl p-5 card-hover transition-all cursor-pointer mb-4">
                                <h3 class="font-bold text-lg mb-2 text-white">س: ${q.question}</h3>
                                <p class="text-gray-400 text-sm font-light mt-2 border-t border-white/10 pt-2"><span class="text-yellow-500 font-bold">ج: </span>${q.hint}</p>
                            </div>`;
                        });
                        qContainer.innerHTML = qHTML;
                    } else {
                        qContainer.innerHTML = `
                        <div class="glass-panel rounded-2xl p-8 flex items-center justify-center">
                           <p class="text-gray-500 text-sm">لا توجد أسئلة مضافة حالياً.</p>
                        </div>`;
                    }
                }
            } catch (err) {
                console.error("فشل جلب البيانات:", err);
            }
        }

        function logout() {
            localStorage.removeItem('dahih_user');
            window.location.replace("/logina.html");
        }
    </script>
</body>
</html>
