<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>لوحة الطالب | منصة الدحيح</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://player.twitch.tv/js/embed/v1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Readex Pro', sans-serif; background-color: #070b19; }
        
        .bg-animated-gradient {
            background: linear-gradient(135deg, #070b19 0%, #0f172a 50%, #070b19 100%);
            background-size: 200% 200%;
            animation: gradientMove 20s ease-in-out infinite;
        }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .glass-panel { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        
        /* 🔥 نظام الستارة الجديد (Stealth Mode) لكسر حماية المتصفح 🔥 */
        #liveStreamSection {
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 0;
            opacity: 0;
            margin-bottom: 0;
            overflow: hidden;
            border-top-width: 0px;
            pointer-events: none; /* لمنع الطالب من الضغط على شيء مخفي */
        }
        #liveStreamSection.stream-active {
            max-height: 1200px; 
            opacity: 1;
            margin-bottom: 2rem;
            border-top-width: 3px;
            pointer-events: auto; /* تفعيل الضغط بعد الظهور */
        }

        .player-crop-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 */
            overflow: hidden;
            border-radius: 1.5rem;
            background-color: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* زووم 110% لقص حواف تويتش (اللوجو والترس) */
        .twitch-iframe-container {
            position: absolute;
            top: -12%;
            left: -5%;
            width: 110%;
            height: 124%;
            z-index: 1;
        }

        /* 🛡️ الدرع الزجاجي لمنع إيقاف الفيديو عند النقر 🛡️ */
        .click-blocker {
            position: absolute;
            inset: 0;
            z-index: 20;
            background: transparent;
        }

        #fs-wrapper:fullscreen { background: #000; display: flex; align-items: center; justify-content: center; }
        #fs-wrapper:fullscreen .player-crop-wrapper { border-radius: 0; border: none; width: 100vw; height: 56.25vw; max-height: 100vh; }
        
        /* تأثيرات باقي اللوحة */
        .card-hover { transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.4); border-color: rgba(255, 255, 255, 0.1); }
        .section-content { transition: max-height 0.5s ease, opacity 0.4s ease; overflow: hidden; }
        .section-content.collapsed { max-height: 0 !important; opacity: 0; padding: 0; border: none; }
    </style>
</head>
<body class="bg-animated-gradient text-white min-h-screen flex flex-col selection:bg-yellow-500 selection:text-black relative">

    <nav class="w-full glass-panel sticky top-0 z-50 border-b border-white/10 shrink-0">
        <div class="max-w-7xl mx-auto px-4 md:px-8 py-4 flex justify-between items-center">
            <div class="text-2xl font-black text-white tracking-tight">الدحيح<span class="text-yellow-500">.</span></div>
            <button onclick="logout()" class="text-xs md:text-sm text-red-400 border border-red-500/20 hover:bg-red-500 hover:text-white px-4 py-2 rounded-xl transition-colors font-bold">
                تسجيل الخروج
            </button>
        </div>
    </nav>

    <main class="flex-grow w-full max-w-7xl mx-auto px-4 md:px-8 py-6 md:py-8 relative">
        
        <section id="liveStreamSection" class="glass-panel rounded-[2rem] border-t-red-500 shadow-[0_0_50px_rgba(239,68,68,0.15)]">
            <div class="p-5 md:p-6 flex items-center justify-between border-b border-white/5 bg-gradient-to-r from-red-500/10 to-transparent">
                <div class="flex items-center gap-3">
                    <span class="relative flex h-3 w-3">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                    </span>
                    <h2 class="text-lg md:text-xl font-bold text-white tracking-tight">البث المباشر التفاعلي</h2>
                </div>
                <button onclick="toggleStudentFullScreen()" class="bg-white/5 hover:bg-white/10 p-2.5 rounded-xl border border-white/10 text-gray-400 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                </button>
            </div>
            
            <div class="p-3 md:p-6 bg-black/60" id="fs-wrapper">
                <div class="player-crop-wrapper shadow-2xl relative">
                    <div class="absolute top-6 right-6 z-40 bg-black/80 backdrop-blur-md px-4 py-2 rounded-2xl border border-white/10 pointer-events-none flex items-center gap-2">
                        <span class="w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse"></span>
                        <span class="text-white font-black text-xs md:text-sm tracking-wide">الدحيح LIVE</span>
                    </div>

                    <div class="twitch-iframe-container" id="twitch-embed"></div>

                    <div class="click-blocker"></div>

                    <div id="unmuteOverlay" class="absolute inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-md transition-all duration-700">
                        <button id="startLiveBtn" class="bg-red-600 hover:bg-red-500 text-white px-10 py-5 rounded-full font-black shadow-[0_0_40px_rgba(220,38,38,0.6)] flex items-center gap-4 transform hover:scale-110 transition-all group">
                            <div class="bg-white/20 p-2 rounded-full group-hover:bg-white/30 transition-colors">
                                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"></path></svg>
                            </div>
                            <span class="text-base md:text-lg">دخول الحصة المباشرة</span>
                        </button>
                    </div>
                </div>
                <p class="text-gray-500 text-xs md:text-sm mt-4 text-center">بث مباشر - يرجى عدم قفل الشاشة أثناء الشرح.</p>
            </div>
        </section>
        <div class="glass-panel rounded-[2rem] p-6 md:p-10 mb-8 border-t-[3px] border-t-yellow-500 relative overflow-hidden">
            <h1 class="text-3xl md:text-5xl font-black mb-2 text-white">مرحباً بك، <span id="stName" class="text-yellow-500">...</span></h1>
            <p class="text-gray-400 font-light text-sm md:text-base" id="stGrade">جاري تحميل بياناتك...</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-8">
            <div class="lg:col-span-2 space-y-6 md:space-y-8">
                <section class="glass-panel rounded-2xl overflow-hidden border-t-[3px] border-t-yellow-500">
                    <div class="p-5 md:p-6 flex items-center justify-between cursor-pointer border-b border-white/5 bg-white/5 hover:bg-white/10" onclick="toggleSection('quizzesSection')">
                        <h2 class="text-xl font-bold text-white">الاختبارات الإلكترونية المتاحة</h2>
                    </div>
                    <div id="quizzesSection" class="section-content max-h-[1000px] p-5 md:p-6 bg-black/20">
                        <div id="qzContainer" class="space-y-4 text-center text-gray-500">جاري التحميل...</div>
                    </div>
                </section>
                
                <section class="glass-panel rounded-2xl overflow-hidden border-t-[3px] border-t-yellow-500">
                    <div class="p-5 md:p-6 flex items-center justify-between cursor-pointer border-b border-white/5 bg-white/5 hover:bg-white/10" onclick="toggleSection('pointsSection')">
                        <h2 class="text-xl font-bold text-white">أهم نقاط المنهج</h2>
                    </div>
                    <div id="pointsSection" class="section-content max-h-[1000px] p-5 md:p-6 bg-black/20">
                        <div id="pointsContainer" class="text-center text-gray-500">لا توجد ملاحظات.</div>
                    </div>
                </section>
            </div>

            <div class="space-y-6 md:space-y-8">
                <section class="glass-panel rounded-2xl p-6 border-t-[3px] border-t-yellow-500">
                    <h2 class="text-lg font-bold text-white mb-4 text-center md:text-right">التقييم المستمر</h2>
                    <div class="bg-black/40 rounded-xl p-4 flex flex-col items-center justify-center border border-white/5 py-10">
                        <span id="studentPointsDisplay" class="text-6xl font-black text-yellow-500 drop-shadow-md" dir="ltr">0%</span>
                        <p class="text-sm text-gray-400 mt-4 text-center">النسبة المئوية للأداء.</p>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <div id="quizModal" class="fixed inset-0 z-[100] bg-black/95 hidden flex items-center justify-center p-4 backdrop-blur-lg transition-opacity">
        <div class="bg-[#0b1021] border border-white/10 w-full max-w-3xl rounded-2xl md:rounded-[2rem] p-5 md:p-8 max-h-[90vh] overflow-y-auto shadow-2xl shadow-black/80">
            <div id="quizModalContent"></div>
        </div>
    </div>

    <script>
        const userDataStr = localStorage.getItem('dahih_user');
        window.availableQuizzes = []; 
        let currentUser = null;
        let twitchPlayer = null;
        
        if (!userDataStr) { window.location.replace("/logina.html"); } 
        else {
            currentUser = JSON.parse(userDataStr);
            document.getElementById('stName').innerText = currentUser.name.split(' ')[0];
            document.getElementById('stGrade').innerText = "المرحلة: " + (currentUser.grade || "عام");
            
            // تهيئة المشغل فوراً في الخلفية
            initTwitchPlayer();
            fetchDashboardData();
            
            // الرادار يعمل كل 8 ثواني لضمان اللقط السريع
            setInterval(fetchDashboardData, 8000); 
        }

        // ==================== قلب استوديو البث (المزدوج) ====================
        function initTwitchPlayer() {
            if (twitchPlayer) return;
            const options = {
                width: '100%', height: '100%', channel: "moooae2tf",
                parent: ["webbb-production-b681.up.railway.app", "localhost"],
                controls: false, muted: true, autoplay: true
            };
            twitchPlayer = new Twitch.Player("twitch-embed", options);

            // الاعتماد المباشر على تويتش في حال تأخر السيرفر
            twitchPlayer.addEventListener(Twitch.Player.PLAYING, forceShowStream);
            twitchPlayer.addEventListener(Twitch.Player.ONLINE, forceShowStream);
        }

        function forceShowStream() {
            const section = document.getElementById('liveStreamSection');
            if(!section.classList.contains('stream-active')) {
                section.classList.add('stream-active');
            }
        }

        function forceHideStream() {
            const section = document.getElementById('liveStreamSection');
            if(section.classList.contains('stream-active')) {
                section.classList.remove('stream-active');
                if(twitchPlayer) twitchPlayer.pause();
                if(document.fullscreenElement) document.exitFullscreen();
            }
        }

        // تفعيل الصوت عند الدخول
        document.getElementById('startLiveBtn').addEventListener('click', () => {
            if(twitchPlayer) { twitchPlayer.setMuted(false); twitchPlayer.setVolume(1.0); twitchPlayer.play(); }
            const overlay = document.getElementById('unmuteOverlay');
            overlay.style.opacity = '0';
            setTimeout(() => overlay.classList.add('hidden', 'pointer-events-none'), 700);
        });

        // زر ملء الشاشة
        function toggleStudentFullScreen() {
            const fsWrapper = document.getElementById('fs-wrapper');
            if (!document.fullscreenElement) {
                if(fsWrapper.requestFullscreen) fsWrapper.requestFullscreen();
                else if(fsWrapper.webkitRequestFullscreen) fsWrapper.webkitRequestFullscreen();
            } else { document.exitFullscreen(); }
        }

        // طي وفتح الأقسام
        function toggleSection(sectionId) {
            const section = document.getElementById(sectionId);
            section.classList.toggle('collapsed');
            if(section.classList.contains('collapsed')) section.style.maxHeight = '0px'; 
            else section.style.maxHeight = section.scrollHeight + 500 + 'px'; 
        }

        // جلب البيانات واستشعار السيرفر
        async function fetchDashboardData() {
            try {
                const res = await fetch('/api/student/dashboard-data', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentUser.email, grade: currentUser.grade })
                });

                if (res.ok) {
                    const data = await res.json();
                    
                    // التحديث من السيرفر كدعم إضافي
                    const isLiveOnServer = data.content?.liveStream?.isLive === true;
                    if (isLiveOnServer) { forceShowStream(); } 
                    else {
                        // لو السيرفر قال مفيش بث، وتويتش كمان مقفول، اخفي الشاشة
                        if(twitchPlayer && twitchPlayer.getPlaybackStats) {
                            // نتأكد إن تويتش فعلاً مش شغال قبل ما نخفيها
                            if(twitchPlayer.getPlayerState() !== "PLAYING") forceHideStream();
                        } else { forceHideStream(); }
                    }

                    // تحديث الإحصائيات
                    document.getElementById('studentPointsDisplay').innerText = (data.studentPoints || 0) + '%';
                    window.availableQuizzes = data.content?.quizzes || [];
                    
                    // رسم الاختبارات
                    const qzContainer = document.getElementById('qzContainer');
                    if (window.availableQuizzes.length > 0) {
                        let qzHTML = '';
                        window.availableQuizzes.slice().reverse().forEach(quiz => {
                            const result = quiz.results ? quiz.results.find(r => r.email === currentUser.email) : null;
                            qzHTML += `<div class="bg-black/30 border border-white/5 rounded-xl p-5 flex flex-col md:flex-row justify-between items-center gap-4 transition-all hover:border-yellow-500/30">
                                <div><h3 class="font-bold text-lg text-white">${quiz.title}</h3><p class="text-xs text-gray-500 mt-1">${quiz.questions.length} أسئلة</p></div>
                                ${result ? `<div class="bg-white/5 text-green-400 font-black px-6 py-2 rounded-xl text-sm">درجتك: ${result.percentage}%</div>` : `<button onclick="openQuizModal('${quiz.id}')" class="bg-yellow-500 text-black font-bold px-8 py-2 rounded-xl text-sm shadow-md">بدء الامتحان</button>`}
                            </div>`;
                        });
                        qzContainer.innerHTML = qzHTML;
                    } else { qzContainer.innerHTML = '<p class="text-center text-gray-500">لا توجد اختبارات إلكترونية حالياً.</p>'; }

                    // رسم الملاحظات
                    const pContainer = document.getElementById('pointsContainer');
                    if (data.content?.points && data.content.points.length > 0) {
                        let pHTML = '<ul class="space-y-3 text-gray-300 text-sm md:text-base">';
                        data.content.points.forEach(p => pHTML += `<li class="flex items-start gap-3"><span class="text-yellow-500 mt-1.5 text-xs">■</span><p class="leading-relaxed">${p}</p></li>`);
                        pContainer.innerHTML = pHTML + '</ul>';
                        pContainer.classList.remove('text-center', 'text-gray-500');
                    }
                }
            } catch (err) { console.log(err); }
        }

        // ==================== نظام فتح الاختبار ====================
        function openQuizModal(quizId) {
            const quiz = window.availableQuizzes.find(q => q.id === quizId);
            if (!quiz) return;

            let html = `<div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4"><h2 class="text-xl md:text-2xl font-bold text-white">${quiz.title}</h2><span class="text-yellow-500 text-sm bg-yellow-500/10 border border-yellow-500/20 px-3 py-1 rounded-lg font-bold">${quiz.questions.length} أسئلة</span></div><form id="activeQuizForm" onsubmit="submitQuiz(event, '${quiz.id}')" class="space-y-6">`;

            quiz.questions.forEach((q, qIndex) => {
                html += `<div class="bg-black/40 p-4 md:p-5 rounded-xl border border-white/5"><h4 class="font-semibold text-base md:text-lg mb-4 text-white leading-relaxed"><span class="text-yellow-500 mr-2">${qIndex + 1}.</span>${q.questionText}</h4><div class="grid grid-cols-1 md:grid-cols-2 gap-3">`;
                q.options.forEach((opt, optIndex) => {
                    const letters = ['أ', 'ب', 'ج', 'د'];
                    html += `<label class="quiz-option cursor-pointer group"><input type="radio" name="q_${qIndex}" value="${optIndex}" required class="hidden"><div class="flex items-center gap-3 p-3 md:p-4 rounded-xl bg-white/5 border border-white/10 group-hover:border-yellow-500/50 transition-all h-full"><div class="w-6 h-6 rounded-md bg-black/50 border border-white/20 flex items-center justify-center text-xs font-bold text-gray-400 group-hover:text-white shrink-0 transition-colors group-hover:bg-black/80">${letters[optIndex]}</div><span class="text-gray-300 text-sm md:text-base leading-relaxed">${opt}</span></div></label>`;
                });
                html += `</div></div>`;
            });

            html += `<div class="flex flex-col md:flex-row gap-3 pt-4 border-t border-white/10"><button type="submit" id="btnSubmitQuiz" class="flex-1 bg-yellow-500 text-black font-bold py-3 md:py-4 rounded-xl hover:bg-yellow-400 transition-colors text-sm md:text-base shadow-md">إنهاء وتسليم الإجابات</button><button type="button" onclick="closeQuizModal()" class="md:w-32 bg-transparent border border-white/10 text-gray-300 font-bold py-3 md:py-4 rounded-xl hover:bg-white/5 transition-colors text-sm md:text-base">إلغاء</button></div></form>`;

            document.getElementById('quizModalContent').innerHTML = html;
            document.getElementById('quizModal').classList.remove('hidden');
        }

        async function submitQuiz(event, quizId) {
            event.preventDefault();
            const btn = document.getElementById('btnSubmitQuiz');
            btn.innerText = "جاري التصحيح..."; btn.disabled = true;

            const quiz = window.availableQuizzes.find(q => q.id === quizId);
            const form = event.target;
            let score = 0;

            quiz.questions.forEach((q, qIndex) => {
                if (parseInt(form.elements[`q_${qIndex}`].value) === q.correctAnswer) score++;
            });

            const percentage = Math.round((score / quiz.questions.length) * 100);

            try {
                await fetch('/api/student/submit-quiz', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentUser.email, studentName: currentUser.name, grade: currentUser.grade, quizId: quizId, score: score, percentage: percentage })
                });

                let colorClass = percentage >= 85 ? 'text-green-400' : (percentage >= 50 ? 'text-blue-400' : 'text-red-400');
                let shadowColor = percentage >= 85 ? 'rgba(74, 222, 128, 0.2)' : (percentage >= 50 ? 'rgba(96, 165, 250, 0.2)' : 'rgba(248, 113, 113, 0.2)');
                const successIcon = `<svg class="w-12 h-12 ${colorClass}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>`;
                
                document.getElementById('quizModalContent').innerHTML = `<div class="text-center py-10 px-6 overflow-hidden flex flex-col items-center"><div class="w-24 h-24 mb-6 rounded-full border border-white/10 flex items-center justify-center bg-black/40 animate-pop-in animate-float relative" style="box-shadow: 0 0 40px ${shadowColor};">${successIcon}</div><h2 class="text-3xl font-bold text-white mb-2 animate-slide-up delay-100">تم تسجيل إجاباتك</h2><p class="text-gray-400 mb-8 animate-slide-up delay-150">هذه هي نتيجتك النهائية المعتمدة</p><div class="inline-block animate-slide-up delay-200 mb-10"><div class="text-8xl font-black ${colorClass}" style="text-shadow: 0 0 30px ${shadowColor};" dir="ltr">${percentage}%</div></div><div class="bg-black/30 border border-white/5 rounded-2xl p-5 text-gray-300 w-full max-w-xs mx-auto mb-10 flex justify-between items-center px-8 animate-slide-up delay-250"><span class="font-medium text-gray-400">الإجابات الصحيحة</span><span class="font-bold text-white text-lg" dir="ltr">${score} / ${quiz.questions.length}</span></div><button onclick="closeQuizModal(); fetchDashboardData();" class="w-full max-w-xs mx-auto bg-white/5 border border-white/10 text-white font-bold py-4 rounded-xl hover:bg-white/10 transition-colors block animate-slide-up delay-300">العودة للوحة التحكم</button></div>`;
            } catch (err) { alert("حدث خطأ، حاول مجدداً."); btn.innerText = "تسليم الإجابات"; btn.disabled = false; }
        }

        function closeQuizModal() { document.getElementById('quizModal').classList.add('hidden'); }
        function logout() { localStorage.removeItem('dahih_user'); window.location.replace("/logina.html"); }
    </script>
</body>
</html>
