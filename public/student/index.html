<html lang="ar" dir="rtl">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <meta name="description" content="لوحة الطالب - منصة الدحيح التعليمية">

    <script src="https://cdn.tailwindcss.com"></script>  
    <link rel="preconnect" href="https://fonts.googleapis.com">  
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>  
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>  
        :root {   
            --accent: #eab308;   
            --accent-hover: #ca8a04;  
        }  
        * {   
            font-family: 'Readex Pro', sans-serif !important;   
            -webkit-tap-highlight-color: transparent;   
            box-sizing: border-box;  
        }  
        body, html {   
            background-color: #070b19;   
            color: white;   
            overscroll-behavior-y: none;  
            overflow-x: hidden; 
            text-rendering: optimizeLegibility; 
        }  
        *:focus { outline: none !important; }  

        h1, h2, h3 {  
            letter-spacing: -0.03em;  
        }  

        body::before {  
            content: '';  
            position: fixed;  
            inset: 0;  
            background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);  
            background-size: 3px 3px;  
            opacity: 0.15;  
            pointer-events: none;  
            z-index: -5;  
        }  

        .glass-panel {   
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015));  
            border: 1px solid rgba(255, 255, 255, 0.08);  
            backdrop-filter: blur(18px);  
            -webkit-backdrop-filter: blur(18px);  
            box-shadow: 0 10px 40px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);  
        }  
          
        .tab-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; }  
        .tab-btn::before { content: ''; position: absolute; inset: 0; background: var(--accent); opacity: 0; transition: opacity 0.3s; z-index: -1; border-radius: inherit; }  
        .tab-btn:hover { background-color: rgba(255, 255, 255, 0.05); }  
        .tab-btn.active { color: #000; font-weight: 700; background: var(--accent); box-shadow: 0 4px 15px rgba(234, 179, 8, 0.2); }  
          
        .tab-content {   
            display: none;  
            opacity: 0;   
            transform: translateY(12px);   
            transition: transform .35s cubic-bezier(.22,1,.36,1), opacity .35s ease;  
        }  
        .tab-content.active {   
            display: block;  
            opacity: 1;   
            transform: translateY(0);   
        }  
          
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }  
        .animate-fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }  
          
        .scrollbar-hide::-webkit-scrollbar { display: none; }  
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }  

        /* ======== كروت الاختبارات Premium UX/UI ======== */  
        .quiz-card {  
            background: linear-gradient(145deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);  
            border: 1px solid rgba(255, 255, 255, 0.08);  
            border-radius: 1.5rem;  
            padding: 1.5rem;  
            position: relative;  
            overflow: hidden;  
            display: flex;  
            flex-direction: column;  
            height: 100%;  
            min-height: 320px;  
            contain: layout paint;  
            transition: transform .35s cubic-bezier(.22,1,.36,1), opacity .35s ease, border-color .35s ease, box-shadow .35s ease, filter .35s ease;  
        }  

        .quiz-card::before {  
            content: '';  
            position: absolute;  
            inset: 0;  
            background: radial-gradient(circle at top right, rgba(255,255,255,0.08), transparent 35%);  
            opacity: 0;  
            transition: opacity .4s ease;  
            pointer-events: none;  
        }  
        .quiz-card:hover::before {  
            opacity: 1;  
        }  
          
        .quiz-card.status-new { border-top: 3px solid #3b82f6; box-shadow: 0 -10px 30px -15px rgba(59, 130, 246, 0.15); }  
        .quiz-card.status-review { border-top: 3px solid #a855f7; box-shadow: 0 -10px 30px -15px rgba(168, 85, 247, 0.15); }  
        .quiz-card.status-hard { border-top: 3px solid #ef4444; box-shadow: 0 -10px 30px -15px rgba(239, 68, 68, 0.15); }  
        .quiz-card.status-completed {   
            border-top: 3px solid #22c55e;   
            box-shadow: 0 -10px 30px -15px rgba(34, 197, 94, 0.15);   
            opacity: 0.82;   
            filter: saturate(0.8);  
        }  

        .quiz-card:hover {  
            transform: perspective(1200px) rotateX(4deg) translateY(-8px) scale(1.015);  
            background: linear-gradient(145deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);  
            z-index: 10;  
        }  
        .quiz-card.status-new:hover { border-color: rgba(59, 130, 246, 0.5); box-shadow: 0 15px 35px rgba(0,0,0,0.6), 0 0 25px rgba(59, 130, 246, 0.2); }  
        .quiz-card.status-review:hover { border-color: rgba(168, 85, 247, 0.5); box-shadow: 0 15px 35px rgba(0,0,0,0.6), 0 0 25px rgba(168, 85, 247, 0.2); }  
        .quiz-card.status-hard:hover { border-color: rgba(239, 68, 68, 0.5); box-shadow: 0 15px 35px rgba(0,0,0,0.6), 0 0 25px rgba(239, 68, 68, 0.2); }  
        .quiz-card.status-completed:hover {   
            opacity: 1;   
            filter: saturate(1);   
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);   
            border-color: rgba(34, 197, 94, 0.4);   
        }  

        .btn-start-quiz {  
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);  
            color: #000; font-weight: 800;  
            padding: 0.8rem 1.5rem; border-radius: 12px;  
            transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 8px;  
            position: relative; overflow: hidden;  
            will-change: transform;  
        }  
        .btn-start-quiz::after {  
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;  
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);  
            transform: skewX(-20deg); transition: 0.5s;  
        }  
        .btn-start-quiz:hover::after { left: 150%; }  
        .btn-start-quiz:hover { transform: scale(1.02); box-shadow: 0 5px 20px rgba(234,179,8,0.4); }  
        .btn-start-quiz:hover svg { transform: translateX(-4px); transition: transform 0.3s; }  
        .btn-start-quiz:active { transform: scale(0.97); }  

        /* Progress Ring Glow */  
        .circular-chart { display: block; margin: 0 auto; max-width: 80%; max-height: 250px; }  
        .circle-bg { fill: none; stroke: rgba(255, 255, 255, 0.1); stroke-width: 3.8; }  
        .circle {   
            fill: none;   
            stroke-width: 3.8;   
            stroke-linecap: round;   
            transition: stroke-dasharray 1.5s ease-out;   
            filter: drop-shadow(0 0 8px currentColor);  
        }  
        @keyframes progressAnimation { 0% { stroke-dasharray: 0 100; } }  
        .percentage { fill: #fff; font-family: 'Readex Pro', sans-serif; font-weight: 900; font-size: 0.5em; text-anchor: middle; }  

        /* Skeleton Loading Shimmer Effect */  
        @keyframes shimmer {  
            100% { transform: translateX(100%); }  
        }  
        .animate-pulse {  
            position: relative;  
            overflow: hidden;  
        }  
        .animate-pulse::after {  
            content: '';  
            position: absolute;  
            inset: 0;  
            transform: translateX(-100%);  
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);  
            animation: shimmer 1.5s infinite;  
        }  
    </style>  

    <script>  
        let activeTabId = 'quizzes';  

        window.switchTab = function(tabId) {  
            if (tabId === activeTabId) return;  

            const currentTab = document.getElementById(`tab-${activeTabId}`);  
            const nextTab = document.getElementById(`tab-${tabId}`);  

            if (!nextTab) return;  

            document.querySelector(`#btn-${activeTabId}`)?.classList.remove('active');  
            document.querySelector(`#btn-${tabId}`)?.classList.add('active');  

            currentTab?.classList.remove('active');  

            setTimeout(() => {  
                if (currentTab) currentTab.style.display = 'none';  
                nextTab.style.display = 'block';  

                requestAnimationFrame(() => {  
                    nextTab.classList.add('active');  
                });  

                activeTabId = tabId;  
            }, 180);  
        };  
    </script>  
</head>

    <script>  
        // كائن التطبيق الرئيسي لإدارة العمليات الحقيقية
        const DahihApp = {  
            logout() {  
                console.log("Logging out...");  
                // أضف منطق مسح الـ Tokens أو الجلسة هنا  
            },  
            
            // دالة حقن ومعالجة البيانات الحقيقية القادمة من الـ API الخاص بك  
            initQuizzes(realQuizzes) {  
                const container = document.getElementById('onlineQuizzesContainer');  
                if (!container || !Array.isArray(realQuizzes)) return;  

                // حساب الإحصائيات الفورية المبنية على البيانات الحقيقية  
                const completed = realQuizzes.filter(q => q.isAttempted).length;  
                const pending = realQuizzes.filter(q => !q.isAttempted).length;  
                const avg = completed > 0   
                    ? Math.round(realQuizzes.filter(q => q.isAttempted).reduce((sum, q) => sum + Number(q.score || 0), 0) / completed)  
                    : 0;  

                document.getElementById('stat-completed').innerText = completed;  
                document.getElementById('stat-pending').innerText = pending;  
                document.getElementById('stat-average').innerText = `${avg}%`;  

                if (realQuizzes.length === 0) {  
                    container.innerHTML = `  
                        <div class="col-span-full flex flex-col items-center justify-center py-20 text-center animate-fade-in-up">  
                            <div class="text-6xl mb-4 opacity-50 grayscale">📚</div>  
                            <h3 class="text-xl font-bold text-white mb-2">لا توجد اختبارات حالياً</h3>  
                            <p class="text-gray-400 max-w-sm">أنت محدث بالكامل! سيتم إضافة اختبارات جديدة قريباً من قبل المحاضر.</p>  
                        </div>  
                    `;  
                    return;  
                }  

                let allCardsHTML = '';  

                const getProgressRing = (score) => {  
                    let color = score >= 85 ? '#22c55e' : (score >= 50 ? '#eab308' : '#ef4444');  
                    let dasharray = `${score}, 100`;  
                    return `  
                        <div class="relative w-16 h-16">  
                            <svg viewBox="0 0 36 36" class="circular-chart w-full h-full transform -rotate-90">  
                                <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />  
                                <path class="circle" stroke="${color}" stroke-dasharray="${dasharray}" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" style="animation: progressAnimation 1.5s ease-out forwards;" />  
                                <text x="18" y="20.35" class="percentage" fill="${color}">${score}%</text>  
                            </svg>  
                        </div>  
                    `;  
                };  

                realQuizzes.forEach((quiz, index) => {  
                    let iconStr = '';  
                    let badgeStr = '';  
                      
                    if(quiz.status === 'new') {  
                        iconStr = `<svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>`;  
                        badgeStr = `<span class="bg-blue-500/20 text-blue-400 text-xs font-bold px-3 py-1 rounded-full border border-blue-500/20">جديد</span>`;  
                    } else if (quiz.status === 'hard') {  
                        iconStr = `<svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>`;  
                        badgeStr = `<span class="bg-red-500/20 text-red-400 text-xs font-bold px-3 py-1 rounded-full border border-red-500/20">مهم وصعب</span>`;  
                    } else if (quiz.status === 'review') {  
                        iconStr = `<svg class="w-6 h-6 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>`;  
                        badgeStr = `<span class="bg-purple-500/20 text-purple-400 text-xs font-bold px-3 py-1 rounded-full border border-purple-500/20">مراجعة</span>`;  
                    } else {  
                        iconStr = `<svg class="w-6 h-6 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;  
                        badgeStr = `<span class="bg-green-500/20 text-green-400 text-xs font-bold px-3 py-1 rounded-full border border-green-500/20">مكتمل</span>`;  
                    }  

                    const delay = index * 70;  

                    allCardsHTML += `  
                        <div class="quiz-card status-${quiz.status} animate-fade-in-up" style="animation-delay: ${delay}ms; opacity: 0;">  
                            <div class="flex justify-between items-start mb-4">  
                                <div class="bg-white/5 p-2.5 rounded-xl border border-white/10 backdrop-blur-md">  
                                    ${iconStr}  
                                </div>  
                                <div class="flex flex-col items-end gap-2">  
                                    ${badgeStr}  
                                    ${quiz.deadline ? `<span class="text-xs font-bold text-orange-400 animate-pulse bg-orange-500/10 px-2 py-1 rounded-md">⏳ ${quiz.deadline}</span>` : ''}  
                                </div>  
                            </div>  
                              
                            <h3 class="text-lg md:text-xl font-bold text-white mb-2 line-clamp-2 leading-snug">${quiz.title}</h3>  
                            <p class="text-gray-400 text-xs md:text-sm mb-6 line-clamp-2">${quiz.description}</p>  
                              
                            ${!quiz.isAttempted ? `  
                                <div class="flex items-center gap-4 text-sm text-gray-400 mb-6 mt-auto bg-black/30 p-3 rounded-xl border border-white/5">  
                                    <div class="flex items-center gap-1.5">  
                                        <svg class="w-4 h-4 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>  
                                        <span class="font-bold">${quiz.questionsCount}</span> س  
                                    </div>  
                                </div>  
                                  
                                <button class="btn-start-quiz w-full start-quiz-btn" data-id="${quiz.id}">  
                                    ابدأ الاختبار الآن  
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>  
                                </button>  
                            ` : `  
                                <div class="mt-auto flex items-center justify-between p-3 bg-black/40 rounded-xl border border-white/5">  
                                    <div class="flex flex-col gap-1">  
                                        <span class="text-gray-400 text-xs font-bold">الدرجة النهائية</span>  
                                        <span class="text-white text-xs">آخر محاولة: <span class="text-gray-300">${quiz.lastAttempt || 'غير محدد'}</span></span>  
                                        <button class="text-blue-400 hover:text-blue-300 text-xs font-bold mt-1 text-right flex items-center gap-1 transition-colors review-quiz-btn" data-id="${quiz.id}">  
                                            مراجعة الإجابات <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>  
                                        </button>  
                                    </div>  
                                    ${getProgressRing(quiz.score)}  
                                </div>  
                            `}  
                        </div>  
                    `;  
                });  

                container.innerHTML = allCardsHTML;  
            }  
        };  

        // المحرك الأساسي لأحداث الأزرار  
        window.QuizEngine = {  
            open(quizId) {  
                console.log("Opening Quiz ID:", quizId);  
                // هنا يتم ربط السكربت الخارجي الخاص بفتح مشغل الاختبارات الفعلي  
            },  
            review(quizId) {  
                console.log("Reviewing Quiz ID:", quizId);  
                // هنا يتم ربط السكربت الخارجي الخاص بمراجعة الأخطاء  
            }  
        };  

        // إدارة نقرات تفويض الأحداث الآمنة والـ Performance-Optimized  
        document.addEventListener('click', (e) => {  
            const startBtn = e.target.closest('.start-quiz-btn');  
            const reviewBtn = e.target.closest('.review-quiz-btn');  
              
            if (startBtn) {  
                QuizEngine.open(Number(startBtn.dataset.id));  
            } else if (reviewBtn) {  
                QuizEngine.review(Number(reviewBtn.dataset.id));  
            }  
        });  
    </script>  
</body>  
</html>
