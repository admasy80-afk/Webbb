<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#070b19">
    <title>لوحة الطالب | منصة الدحيح</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#070b19',
                            card: 'rgba(255, 255, 255, 0.02)',
                            border: 'rgba(255, 255, 255, 0.05)',
                            accent: '#eab308',
                            success: '#22c55e',
                            danger: '#ef4444'
                        }
                    },
                    fontFamily: {
                        sans: ['Readex Pro', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --glass-bg: rgba(15, 20, 35, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background-color: theme('colors.brand.bg');
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(234, 179, 8, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(34, 197, 94, 0.05), transparent 25%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        .glass-panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .quiz-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 1.75rem;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease, border-color 0.3s ease;
            z-index: 1;
        }

        .quiz-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: inherit;
            padding: 2px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent 50%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        @media (hover: hover) {
            .quiz-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
                border-color: rgba(255,255,255,0.15);
            }
            .quiz-card:hover::before { opacity: 1; }
        }

        .quiz-card.completed {
            background: linear-gradient(145deg, rgba(34,197,94,0.05) 0%, rgba(34,197,94,0.01) 100%);
            border-color: rgba(34,197,94,0.2);
        }

        .quiz-card.completed::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(34,197,94,0.1) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
            z-index: -1;
        }

        .quiz-card.completed:hover::after { opacity: 1; }

        .score-circle {
            width: 64px; height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.1rem;
            position: relative;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
        }

        .score-circle::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            padding: 2px;
            background: conic-gradient(var(--score-color) var(--score-deg), transparent 0);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: fillRing 1.5s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
        }

        @keyframes fillRing { from { background: conic-gradient(var(--score-color) 0deg, transparent 0); } }

        .score-high { --score-color: #22c55e; color: #4ade80; text-shadow: 0 0 10px rgba(34,197,94,0.5); }
        .score-med { --score-color: #eab308; color: #fde047; text-shadow: 0 0 10px rgba(234,179,8,0.5); }
        .score-low { --score-color: #ef4444; color: #f87171; text-shadow: 0 0 10px rgba(239,68,68,0.5); }

        .btn-glow {
            background: theme('colors.brand.accent');
            color: #000;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.3);
        }

        .btn-glow::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg) translateY(-100%);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-glow:hover {
            box-shadow: 0 0 25px rgba(234, 179, 8, 0.5);
            transform: scale(1.02);
        }

        .btn-glow:hover::after {
            transform: rotate(45deg) translateY(100%);
        }

        .skeleton-shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }

        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        .badge {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="flex flex-col h-[100dvh] overflow-hidden antialiased">

    <header class="glass-panel sticky top-0 z-50 px-6 py-4 flex items-center justify-between shadow-2xl">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-xl bg-brand-accent flex items-center justify-center shadow-[0_0_15px_rgba(234,179,8,0.3)]">
                <svg class="w-6 h-6 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
            </div>
            <div>
                <h1 class="text-xl md:text-2xl font-black tracking-tight bg-clip-text text-transparent bg-gradient-to-l from-white to-gray-400">منصة الدحيح</h1>
                <p class="text-xs text-brand-accent font-medium">نظام الاختبارات المتقدم</p>
            </div>
        </div>
        <div class="flex gap-2 bg-black/40 p-1 rounded-lg border border-white/5">
            <button class="filter-btn active px-4 py-1.5 rounded-md text-sm font-semibold bg-white/10 text-white transition-all" data-filter="all">الكل</button>
            <button class="filter-btn px-4 py-1.5 rounded-md text-sm font-semibold text-gray-400 hover:text-white transition-all" data-filter="pending">متاح</button>
            <button class="filter-btn px-4 py-1.5 rounded-md text-sm font-semibold text-gray-400 hover:text-white transition-all" data-filter="completed">مكتمل</button>
        </div>
    </header>

    <main class="flex-grow h-full overflow-y-auto p-4 md:p-8" id="mainScrollArea">
        <div class="max-w-7xl mx-auto w-full pb-24">
            
            <div class="flex items-center justify-between mb-8 opacity-0" id="pageHeader">
                <h2 class="text-3xl md:text-4xl font-black text-white flex items-center gap-3">
                    <span class="w-2 h-8 bg-brand-accent rounded-full shadow-[0_0_10px_rgba(234,179,8,0.5)]"></span>
                    الاختبارات الإلكترونية
                </h2>
                <span id="statsBadge" class="hidden md:inline-flex badge px-4 py-2 rounded-xl text-sm font-medium text-gray-300"></span>
            </div>

            <div id="onlineQuizzesContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                </div>
        </div>
    </main>

    <script>
        const QuizManager = (() => {
            const container = document.getElementById('onlineQuizzesContainer');
            const statsBadge = document.getElementById('statsBadge');
            const filterBtns = document.querySelectorAll('.filter-btn');
            
            let allQuizzes = [];
            let currentFilter = 'all';
            let abortController = null;

            // Cache configuration
            const CACHE_KEY = 'duhih_quizzes_cache';
            const CACHE_TTL = 5 * 60 * 1000; 

            const renderSkeleton = () => {
                container.innerHTML = '';
                for(let i=0; i<8; i++) {
                    const el = document.createElement('div');
                    el.className = 'quiz-card skeleton-shimmer border-transparent h-[240px] opacity-0';
                    container.appendChild(el);
                }
                gsap.to('.skeleton-shimmer', { opacity: 1, duration: 0.3, stagger: 0.05 });
            };

            const renderEmptyState = (message = 'لا توجد اختبارات متاحة حالياً', isError = false) => {
                container.innerHTML = '';
                const div = document.createElement('div');
                div.className = 'col-span-full flex flex-col items-center justify-center py-20 opacity-0';
                
                const iconColor = isError ? 'text-brand-danger' : 'text-gray-500';
                const iconSvg = isError 
                    ? `<svg class="w-20 h-20 mb-6 ${iconColor} drop-shadow-[0_0_15px_rgba(239,68,68,0.3)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`
                    : `<svg class="w-20 h-20 mb-6 ${iconColor}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>`;

                div.innerHTML = `
                    ${iconSvg}
                    <h3 class="text-2xl font-bold text-white mb-2">${isError ? 'حدث خطأ' : 'لا يوجد محتوى'}</h3>
                    <p class="text-gray-400 mb-8 text-center max-w-md">${message}</p>
                    <button id="retryBtn" class="btn-glow px-8 py-3 rounded-xl font-bold flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        تحديث الصفحة
                    </button>
                `;
                container.appendChild(div);
                
                document.getElementById('retryBtn').addEventListener('click', () => fetchQuizzes(true));
                gsap.to(div, { opacity: 1, y: -20, duration: 0.5, ease: "back.out(1.7)" });
            };

            const buildQuizCard = (quiz) => {
                const isCompleted = quiz.attempted;
                const card = document.createElement('div');
                card.className = `quiz-card ${isCompleted ? 'completed' : ''} opacity-0 translate-y-8`;
                card.dataset.quizId = quiz.id;

                const headerWrapper = document.createElement('div');
                headerWrapper.className = 'mb-6';
                
                const title = document.createElement('h3');
                title.className = 'text-xl font-bold text-white leading-snug line-clamp-2';
                title.textContent = quiz.title || 'اختبار بدون عنوان';
                
                headerWrapper.appendChild(title);
                card.appendChild(headerWrapper);

                if (!isCompleted) {
                    const metaWrapper = document.createElement('div');
                    metaWrapper.className = 'flex flex-wrap gap-2 mb-6 mt-auto';
                    
                    const qBadge = document.createElement('span');
                    qBadge.className = 'badge px-3 py-1.5 rounded-lg text-xs font-semibold text-gray-300 flex items-center gap-1.5';
                    qBadge.innerHTML = `<svg class="w-4 h-4 text-brand-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> ${quiz.questionsCount || 0} سؤال`;

                    const tBadge = document.createElement('span');
                    tBadge.className = 'badge px-3 py-1.5 rounded-lg text-xs font-semibold text-gray-300 flex items-center gap-1.5';
                    tBadge.innerHTML = `<svg class="w-4 h-4 text-brand-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> ${quiz.duration || 0} دقيقة`;

                    metaWrapper.appendChild(qBadge);
                    metaWrapper.appendChild(tBadge);
                    card.appendChild(metaWrapper);

                    const btn = document.createElement('button');
                    btn.className = 'btn-glow w-full py-3.5 rounded-xl font-bold text-[15px] flex items-center justify-center gap-2 mt-auto';
                    btn.innerHTML = `ابدأ الاختبار الآن <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>`;
                    
                    btn.addEventListener('click', () => {
                        if (window.QuizEngine && typeof window.QuizEngine.open === 'function') {
                            window.QuizEngine.open(quiz);
                        } else {
                            console.warn('QuizEngine is not defined', quiz);
                            btn.innerHTML = 'غير متوفر حالياً';
                            btn.classList.replace('btn-glow', 'bg-gray-700');
                            setTimeout(() => {
                                btn.innerHTML = `ابدأ الاختبار الآن <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>`;
                                btn.classList.replace('bg-gray-700', 'btn-glow');
                            }, 2000);
                        }
                    });
                    
                    card.appendChild(btn);

                } else {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'mt-auto flex items-center justify-between p-4 bg-black/40 rounded-2xl border border-white/5 backdrop-blur-md';
                    
                    const labelDiv = document.createElement('div');
                    labelDiv.className = 'flex flex-col';
                    labelDiv.innerHTML = `<span class="text-xs text-gray-400 font-medium mb-1">النتيجة النهائية</span><span class="text-sm font-bold text-white flex items-center gap-1.5"><svg class="w-4 h-4 text-brand-success" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> مكتمل</span>`;
                    
                    const score = Number(quiz.score || 0);
                    const deg = (score / 100) * 360;
                    let scoreClass = 'score-low';
                    if (score >= 85) scoreClass = 'score-high';
                    else if (score >= 50) scoreClass = 'score-med';

                    const scoreCircle = document.createElement('div');
                    scoreCircle.className = `score-circle ${scoreClass}`;
                    scoreCircle.style.setProperty('--score-deg', `${deg}deg`);
                    scoreCircle.innerHTML = `<span>${score}</span><span class="text-xs opacity-70">%</span>`;

                    wrapper.appendChild(labelDiv);
                    wrapper.appendChild(scoreCircle);
                    card.appendChild(wrapper);
                }

                return card;
            };

            const renderQuizzes = () => {
                container.innerHTML = '';
                
                const filtered = allQuizzes.filter(q => {
                    if (currentFilter === 'pending') return !q.attempted;
                    if (currentFilter === 'completed') return q.attempted;
                    return true;
                });

                statsBadge.textContent = `الإجمالي: ${filtered.length}`;
                statsBadge.classList.remove('hidden');

                if (filtered.length === 0) {
                    renderEmptyState(currentFilter === 'all' ? 'لا توجد اختبارات متاحة لك في الوقت الحالي.' : 'لا توجد اختبارات تطابق الفلتر المحدد.');
                    return;
                }

                const fragment = document.createDocumentFragment();
                const cards = [];

                filtered.forEach(quiz => {
                    const card = buildQuizCard(quiz);
                    cards.push(card);
                    fragment.appendChild(card);
                });

                container.appendChild(fragment);

                gsap.to(cards, {
                    y: 0,
                    opacity: 1,
                    duration: 0.5,
                    stagger: 0.05,
                    ease: "power3.out",
                    clearProps: "all"
                });
            };

            const handleFilters = () => {
                filterBtns.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        filterBtns.forEach(b => {
                            b.classList.remove('bg-white/10', 'text-white');
                            b.classList.add('text-gray-400');
                        });
                        const target = e.target;
                        target.classList.remove('text-gray-400');
                        target.classList.add('bg-white/10', 'text-white');
                        
                        currentFilter = target.dataset.filter;
                        renderQuizzes();
                    });
                });
            };

            const fetchQuizzes = async (forceRefresh = false) => {
                if (abortController) abortController.abort();
                abortController = new AbortController();

                renderSkeleton();

                try {
                    const token = localStorage.getItem('token');
                    
                    if (!forceRefresh) {
                        const cached = sessionStorage.getItem(CACHE_KEY);
                        if (cached) {
                            const parsedCache = JSON.parse(cached);
                            if (Date.now() - parsedCache.timestamp < CACHE_TTL) {
                                allQuizzes = parsedCache.data;
                                renderQuizzes();
                                return;
                            }
                        }
                    }

                    const response = await fetch('/api/student/quizzes', {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${token || ''}`,
                            'Content-Type': 'application/json'
                        },
                        signal: abortController.signal
                    });

                    if (!response.ok) {
                        if (response.status === 401 || response.status === 403) throw new Error('AUTH_ERROR');
                        throw new Error(`HTTP_ERROR_${response.status}`);
                    }

                    const data = await response.json();
                    
                    allQuizzes = Array.isArray(data) ? data : (data.quizzes || []);
                    
                    sessionStorage.setItem(CACHE_KEY, JSON.stringify({
                        timestamp: Date.now(),
                        data: allQuizzes
                    }));

                    renderQuizzes();

                } catch (error) {
                    if (error.name === 'AbortError') return;
                    console.error('Quiz Fetch Error:', error);
                    let msg = 'تعذر الاتصال بالخادم، يرجى المحاولة لاحقاً.';
                    if (error.message === 'AUTH_ERROR') msg = 'انتهت الجلسة، يرجى تسجيل الدخول مجدداً.';
                    renderEmptyState(msg, true);
                    statsBadge.classList.add('hidden');
                }
            };

            const init = () => {
                gsap.to('#pageHeader', { opacity: 1, y: 0, duration: 0.8, ease: "power2.out" });
                handleFilters();
                fetchQuizzes();
            };

            return { init, updateCard: fetchQuizzes }; // Exposing fetchQuizzes as updateCard to refresh softly if needed externally
        })();

        document.addEventListener('DOMContentLoaded', QuizManager.init);
    </script>
</body>
</html>
