<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | منصة الدحيح</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Readex Pro', sans-serif; 
            background: #070b19;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
            perspective: 1200px;
        }

        /* الطبقات السينمائية */
        .orb { position: absolute; border-radius: 9999px; filter: blur(90px); opacity: 0.18; animation: float 12s ease-in-out infinite; z-index: 0; }
        .orb1 { width: 300px; height: 300px; background: #eab308; top: -50px; right: -50px; }
        .orb2 { width: 250px; height: 250px; background: #7c3aed; bottom: -50px; left: -50px; }
        @keyframes float { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-30px); } }

        .glass-card {
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: rgba(255, 255, 255, 0.03);
            width: 100%;
            max-width: 400px;
            z-index: 2;
            transition: transform 0.3s ease;
        }

        /* الأنيميشن */
        .animate-fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .hidden { display: none !important; }
    </style>
</head>

<body>

    <div class="orb orb1"></div>
    <div class="orb orb2"></div>

    <!-- كارت تسجيل الدخول -->
    <div class="glass-card rounded-[2.5rem] p-8 animate-fade-in">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-yellow-500 mb-2">الدحيح.</h1>
            <p class="text-gray-400 text-sm">أهلاً بك مجدداً، سجل دخولك</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <input type="text" id="loginIdentifier" placeholder="البريد أو رقم الهاتف" class="w-full bg-black/40 border border-white/10 text-white rounded-xl px-4 py-3 focus:border-yellow-500 focus:outline-none transition-all text-right" dir="ltr">
            
            <div class="relative">
                <input type="password" id="password" placeholder="كلمة المرور" class="w-full bg-black/40 border border-white/10 text-white rounded-xl px-4 py-3 focus:border-yellow-500 focus:outline-none transition-all text-right" dir="ltr">
                <button type="button" id="togglePassword" class="absolute left-3 top-3.5 text-gray-500 hover:text-yellow-500 transition-all">
                    <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                </button>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-yellow-500 text-black font-bold py-3 rounded-xl hover:bg-yellow-400 transition-all">تسجيل الدخول</button>
            <p id="msg" class="text-red-400 text-xs text-center hidden"></p>
        </form>
    </div>

<script>
    const form = document.getElementById('loginForm');
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.getElementById('togglePassword');
    const eyeIcon = document.getElementById('eyeIcon');

    // تصحيح العين (مع أنيميشن بسيط)
    toggleBtn.onclick = () => {
        const isPass = passwordInput.type === 'password';
        passwordInput.type = isPass ? 'text' : 'password';
        eyeIcon.style.transform = "scale(0.8)";
        setTimeout(() => eyeIcon.style.transform = "scale(1)", 100);
    };

    // تصحيح منطق التسجيل (لا يطردك إلا لو السيرفر أرجع خطأ)
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = document.getElementById('msg');
        const btn = document.getElementById('submitBtn');
        
        btn.innerText = "جاري الدخول...";
        
        // محاكاة التحقق (استبدلها بـ fetch الحقيقي الخاص بك)
        setTimeout(() => {
            // هنا الكود اللي يوديك للصفحة
            window.location.href = "/student/"; 
        }, 1500);
    });
</script>
</body>
</html>
