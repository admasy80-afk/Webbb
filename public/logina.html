<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>تسجيل الدخول | منصة الدحيح</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { font-family: 'Readex Pro', sans-serif; }
        .bg-animated-gradient {
            background: linear-gradient(135deg, #070b19, #0f172a, #070b19, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass-card {
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }
        @keyframes customFadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up {
            opacity: 0;
            animation: customFadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>

<body class="bg-animated-gradient text-white min-h-screen flex items-center justify-center p-6">

    <div class="glass-card bg-white/5 w-full max-w-md rounded-[2.5rem] p-10 relative overflow-hidden animate-fade-up">
        
        <div class="text-center mb-8">
            <div class="text-4xl font-black text-yellow-500 mb-2 tracking-tight">الدحيح<span class="text-white">.</span></div>
            <h2 class="text-xl font-bold mt-4 mb-2">تسجيل الدخول</h2>
            <p class="text-gray-400 text-xs leading-relaxed">سجل دخولك بواسطة البريد أو رقم الهاتف</p>
        </div>

        <form id="loginForm">

            <div class="mb-5">
                <label class="block text-xs font-medium text-gray-300 mb-2 flex justify-between">
                    <span>البريد أو رقم الهاتف</span>
                </label>
                <input type="text" id="loginIdentifier" required placeholder="example@mail.com أو 010..."
                    class="w-full bg-black/30 border border-white/10 text-white placeholder-gray-600 rounded-xl px-4 py-3 focus:outline-none focus:border-yellow-500 transition-colors text-right"
                    dir="ltr">
            </div>

            <div class="mb-6">
                <label class="block text-xs font-medium text-gray-300 mb-2 flex justify-between">
                    <span>كلمة السر</span>
                </label>
                <input type="password" id="password" required placeholder="••••••••"
                    class="w-full bg-black/30 border border-white/10 text-white placeholder-gray-600 rounded-xl px-4 py-3 focus:outline-none focus:border-yellow-500 transition-colors text-right"
                    dir="ltr">
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-yellow-500 text-black font-bold py-3.5 rounded-xl hover:bg-yellow-400 transition-all duration-300 shadow-[0_0_15px_rgba(234,179,8,0.3)] transform hover:scale-[1.02]">
                تسجيل الدخول
            </button>

            <div class="mt-6 text-center">
                <p class="text-gray-400 text-sm">معندكش حساب؟ 
                    <a href="/register.html" class="text-yellow-500 font-bold hover:underline">إضغط هنا</a>
                </p>
            </div>

            <p id="successMessage" class="text-green-400 text-xs text-center mt-4 hidden p-2 bg-green-400/10 rounded-lg"></p>
            <p id="errorMessage" class="text-red-400 text-xs text-center mt-4 hidden p-2 bg-red-400/10 rounded-lg"></p>

        </form>
    </div>

<script>
const form = document.getElementById('loginForm');
const btn = document.getElementById('submitBtn');
const errorMsg = document.getElementById('errorMessage');
const successMsg = document.getElementById('successMessage');

function setLoading(state) {
    if (state) {
        btn.innerText = "جاري التحقق...";
        btn.disabled = true;
        btn.style.opacity = "0.7";
    } else {
        btn.disabled = false;
        btn.style.opacity = "1";
    }
}

function showError(msg) {
    errorMsg.innerText = msg;
    errorMsg.classList.remove('hidden');
    successMsg.classList.add('hidden');
}

function showSuccess(msg) {
    successMsg.innerText = msg;
    successMsg.classList.remove('hidden');
    errorMsg.classList.add('hidden');
}

function validate(identifier, password) {
    if (!identifier) return "اكتب البريد أو رقم الهاتف";
    const isEmail = identifier.includes('@');
    const isPhone = /^[0-9+]{8,15}$/.test(identifier);

    if (!isEmail && !isPhone) return "اكتب إيميل صحيح أو رقم هاتف صحيح";
    if (!password || password.length < 4) return "كلمة المرور قصيرة جدًا";
    return null;
}

form.addEventListener('submit', async (event) => {
    event.preventDefault();

    const identifier = document.getElementById('loginIdentifier').value.trim();
    const password = document.getElementById('password').value;

    const validationError = validate(identifier, password);
    if (validationError) { showError(validationError); return; }

    setLoading(true);
    errorMsg.classList.add('hidden');
    successMsg.classList.add('hidden');

    try {
        const response = await fetch('/api/saveUser', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ identifier, password })
        });

        const text = await response.text();
        let result = {};
        try { result = text ? JSON.parse(text) : {}; } catch (e) { throw new Error("استجابة السيرفر غير صالحة"); }

        if (!response.ok) throw new Error(result.message || "فشل تسجيل الدخول");

        showSuccess("تم بنجاح تسجيل الدخول");
        btn.innerText = "تم بنجاح";
        btn.style.backgroundColor = "#22c55e";

        // 🔥 التعديل السحري هنا: حفظ التوكن وبيانات المستخدم بشكل سليم 🔥
        if (result.token) {
            localStorage.setItem('userToken', result.token);
            localStorage.setItem('dahih_token', result.token); // نسخة احتياطية
        }
        if (result.userData) {
            localStorage.setItem('userData', JSON.stringify(result.userData));
            localStorage.setItem('dahih_user', JSON.stringify(result.userData)); // عشان السكريبتات القديمة بتاعتك تفضل شغالة
        }

        // التوجيه الذكي للمدير والطالب مع إضافة فحص تأكيد الهاتف
        setTimeout(() => {
            const user = result.userData;
            
            console.log("الدور الحالي:", user.role); 

            if (user.role === 'dev' || user.role === 'owner') {
                window.location.replace("/admin.html");
            } else if (user.status === 'pending' || user.status === 'rejected') {
                window.location.replace("/status.html");
            } else {
                // الطالب مقبول، هل وثق رقمه؟
                if (user.phoneVerified) {
                    window.location.replace("/dashboard.html");
                } else {
                    window.location.replace("/verify.html");
                }
            }
        }, 1000);

    } catch (error) {
        showError(error.message);
        btn.innerText = "حاول مرة أخرى";
    } finally {
        setLoading(false);
    }
});
</script>
</body>
</html>
