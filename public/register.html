<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | منصة الدحيح</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Readex Pro', sans-serif; }
        .bg-animated { 
            background: linear-gradient(135deg, #070b19, #0f172a, #1e1b4b); 
            background-size: 400% 400%; 
            animation: move 15s ease infinite; 
        }
        @keyframes move { 0% {background-position: 0% 50%} 50% {background-position: 100% 50%} 100% {background-position: 0% 50%} }
        .glass { 
            backdrop-filter: blur(20px); 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }

        /* أنيميشن النجاح */
        @keyframes success-pop {
            0% { transform: scale(0.9); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-success { animation: success-pop 0.4s ease-out forwards; }

        /* أنيميشن الفشل (اهتزاز) */
        @keyframes error-shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .animate-error { animation: error-shake 0.3s ease-in-out; }

        input:focus, select:focus {
            border-color: #eab308 !important;
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.15);
            transform: translateY(-2px);
        }
        input, select { transition: all 0.3s ease; }
        
        /* تخصيص الـ Select ليناسب التصميم المظلم */
        select option {
            background-color: #0f172a;
            color: white;
        }
    </style>
</head>
<body class="bg-animated text-white min-h-screen p-4 md:p-8 flex items-center justify-center">

    <div class="glass w-full max-w-3xl rounded-[2rem] p-8 md:p-12 shadow-2xl my-8">
        
        <div class="text-center mb-10">
            <h1 class="text-3xl md:text-4xl font-black text-yellow-500 tracking-tight mb-2">طلب إنشاء حساب جديد</h1>
            <p class="text-gray-400 text-sm md:text-base">يرجى إدخال البيانات المطلوبة بدقة لإتمام عملية التسجيل</p>
        </div>

        <form id="regForm" class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-5">
            
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">الاسم الأول</label>
                <input type="text" id="fName" required class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 focus:outline-none text-white transition-colors">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">الاسم الثاني</label>
                <input type="text" id="sName" required class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 focus:outline-none text-white transition-colors">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">الاسم الثالث</label>
                <input type="text" id="tName" required class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 focus:outline-none text-white transition-colors">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">الاسم الأخير</label>
                <input type="text" id="lName" required class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 focus:outline-none text-white transition-colors">
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">رقم الهاتف</label>
                <input type="tel" id="phone" placeholder="01XXXXXXXXX" required class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 focus:outline-none text-white transition-colors placeholder-gray-600 text-right" dir="ltr">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">رقم هاتف ولي الأمر</label>
                <input type="tel" id="pPhone" placeholder="01XXXXXXXXX" required class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 focus:outline-none text-white transition-colors placeholder-gray-600 text-right" dir="ltr">
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">الجنس</label>
                <select id="gender" required class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 focus:outline-none text-white transition-colors appearance-none cursor-pointer">
                    <option value="" disabled selected>اختر الجنس</option>
                    <option value="ذكر">ذكر</option>
                    <option value="أنثى">أنثى</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">المرحلة الدراسية</label>
                <select id="level" required onchange="updateGrades()" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 focus:outline-none text-white transition-colors appearance-none cursor-pointer">
                    <option value="" disabled selected>اختر المرحلة</option>
                    <option value="primary">ابتدائي</option>
                    <option value="preparatory">إعدادي</option>
                    <option value="secondary">ثانوي</option>
                </select>
            </div>

            <div class="md:col-span-2">
                <label class="block text-xs font-medium text-gray-400 mb-1.5">الصف الدراسي</label>
                <select id="grade" required class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 focus:outline-none text-white transition-colors appearance-none cursor-pointer">
                    <option value="" disabled selected>يرجى اختيار المرحلة الدراسية أولاً</option>
                </select>
            </div>

            <div class="md:col-span-2">
                <label class="block text-xs font-medium text-gray-400 mb-1.5">البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="example@mail.com" required class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 focus:outline-none text-white transition-colors placeholder-gray-600 text-right" dir="ltr">
            </div>
            
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">كلمة المرور</label>
                <input type="password" id="pass" placeholder="••••••••" required class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 focus:outline-none text-white transition-colors placeholder-gray-600 text-right" dir="ltr">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">تأكيد كلمة المرور</label>
                <input type="password" id="confirmPass" placeholder="••••••••" required class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 focus:outline-none text-white transition-colors placeholder-gray-600 text-right" dir="ltr">
            </div>

            <div class="md:col-span-2 mt-4">
                <button type="submit" id="subBtn" class="w-full bg-yellow-500 text-black font-bold text-lg py-4 rounded-xl hover:bg-yellow-400 transition-all duration-300 shadow-[0_0_15px_rgba(234,179,8,0.2)] transform hover:scale-[1.01]">
                    تأكيد وإنشاء الحساب
                </button>
            </div>
            
            <div class="md:col-span-2 text-center mt-2">
                <p class="text-gray-400 text-sm">لديك حساب بالفعل؟ 
                    <a href="/logina.html" class="text-yellow-500 font-bold hover:underline">سجل دخولك الآن</a>
                </p>
            </div>
        </form>
        
        <div id="msgContainer" class="mt-6 hidden">
            <p id="msg" class="p-4 rounded-xl font-bold text-center text-sm"></p>
        </div>
    </div>

    <script>
        function updateGrades() {
            const level = document.getElementById('level').value;
            const gradeSelect = document.getElementById('grade');
            gradeSelect.innerHTML = '';
            
            const grades = {
                primary: [
                    "الصف الأول الابتدائي", 
                    "الصف الثاني الابتدائي", 
                    "الصف الثالث الابتدائي", 
                    "الصف الرابع الابتدائي", 
                    "الصف الخامس الابتدائي", 
                    "الصف السادس الابتدائي"
                ],
                preparatory: [
                    "الصف الأول الإعدادي", 
                    "الصف الثاني الإعدادي", 
                    "الصف الثالث الإعدادي"
                ],
                secondary: [
                    "الصف الأول الثانوي", 
                    "الصف الثاني الثانوي", 
                    "الصف الثالث الثانوي"
                ]
            };

            if (grades[level]) {
                grades[level].forEach(g => {
                    let opt = document.createElement('option');
                    opt.value = g;
                    opt.innerHTML = g;
                    gradeSelect.appendChild(opt);
                });
            }
        }

        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('subBtn');
            const msg = document.getElementById('msg');
            const msgContainer = document.getElementById('msgContainer');
            
            // إعادة ضبط الحالة قبل البدء
            msgContainer.classList.add('hidden');
            msgContainer.classList.remove('animate-success', 'animate-error');

            const pass = document.getElementById('pass').value;
            const confirmPass = document.getElementById('confirmPass').value;

            if (pass !== confirmPass) {
                msg.innerText = "❌ كلمات المرور غير متطابقة!";
                msg.className = "p-4 rounded-xl font-bold text-center text-sm text-red-400 bg-red-400/10 border border-red-500/20";
                msgContainer.classList.remove('hidden');
                msgContainer.classList.add('animate-error');
                return;
            }

            btn.innerText = "جاري الحفظ...";
            btn.disabled = true;

            const formData = {
                first_name: document.getElementById('fName').value.trim(),
                second_name: document.getElementById('sName').value.trim(),
                third_name: document.getElementById('tName').value.trim(),
                last_name: document.getElementById('lName').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                parent_phone: document.getElementById('pPhone').value.trim(),
                gender: document.getElementById('gender').value,
                level: document.getElementById('level').value,
                grade: document.getElementById('grade').value,
                email: document.getElementById('email').value.trim(),
                password: pass
            };

            try {
                const response = await fetch('/api/saveUser', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const text = await response.text();
                let result = {};
                try { result = text ? JSON.parse(text) : {}; } catch (e) { throw new Error("استجابة السيرفر غير صالحة"); }

                if (!response.ok) { throw new Error(result.message || "فشل التسجيل"); }

                // حالة النجاح
                msg.innerText = "✅ تم إنشاء حسابك بنجاح";
                msg.className = "p-4 rounded-xl font-bold text-center text-sm text-green-400 bg-green-400/10 border border-green-500/20";
                msgContainer.classList.remove('hidden');
                msgContainer.classList.add('animate-success');
                
                btn.innerText = "تم بنجاح ✓";
                btn.classList.add('bg-green-500', 'text-white');
                btn.classList.remove('bg-yellow-500', 'text-black');

                setTimeout(() => { window.location.href = "/"; }, 2000);

            } catch (err) {
                // حالة الفشل
                msg.innerText = "❌ " + err.message;
                msg.className = "p-4 rounded-xl font-bold text-center text-sm text-red-400 bg-red-400/10 border border-red-500/20";
                msgContainer.classList.remove('hidden');
                msgContainer.classList.add('animate-error');
                
                btn.disabled = false;
                btn.innerText = "تأكيد وإنشاء الحساب";
            }
        });
    </script>
</body>
</html>
