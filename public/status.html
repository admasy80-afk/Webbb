<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حالة الحساب | منصة الدحيح</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Readex Pro', sans-serif; }
        .bg-animated-gradient {
            background: linear-gradient(135deg, #070b19, #0f172a, #070b19, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .glass-panel { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(12px); 
        }
        
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        .animate-pulse-slow { animation: pulse-slow 3s ease-in-out infinite; }
    </style>
</head>
<body class="bg-animated-gradient text-white min-h-screen flex flex-col items-center justify-center p-6 selection:bg-yellow-500 selection:text-black">

    <div class="glass-panel w-full max-w-lg rounded-[2.5rem] p-10 relative overflow-hidden text-center shadow-2xl">
        
        <div class="text-3xl font-black text-yellow-500 tracking-tight mb-8">الدحيح<span class="text-white">.</span></div>

        <div id="pendingSection" class="hidden">
            <div class="w-24 h-24 mx-auto bg-yellow-500/20 rounded-full flex items-center justify-center mb-6 animate-pulse-slow border border-yellow-500/50">
                <svg class="w-12 h-12 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <h2 class="text-3xl font-bold mb-3">طلبك قيد المراجعة</h2>
            <p class="text-gray-400 text-sm leading-relaxed mb-8">
                أهلاً بك يا <span id="pendingName" class="font-bold text-white"></span>. حسابك حالياً قيد المراجعة من قِبل إدارة المنصة. يرجى الانتظار لحين تفعيل الحساب، وسيمكنك الدخول إلى المنصة قريباً.
            </p>
        </div>

        <div id="rejectedSection" class="hidden">
            <div class="w-24 h-24 mx-auto bg-red-500/20 rounded-full flex items-center justify-center mb-6 border border-red-500/50">
                <svg class="w-12 h-12 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </div>
            <h2 class="text-3xl font-bold text-red-400 mb-3">تم رفض الطلب</h2>
            <p class="text-gray-400 text-sm leading-relaxed mb-4">
                عذراً يا <span id="rejectedName" class="font-bold text-white"></span>، لم يتم قبول طلب انضمامك للمنصة في الوقت الحالي.
            </p>
            
            <div class="bg-red-500/10 border border-red-500/20 rounded-xl p-4 text-right mb-8">
                <span class="block text-xs font-bold text-red-400 mb-1">سبب الرفض:</span>
                <span id="rejectionReason" class="text-sm text-gray-300">لا يوجد سبب محدد.</span>
            </div>
        </div>

        <div class="flex flex-col gap-3">
            <button onclick="checkAgain()" class="w-full bg-white/5 border border-white/10 text-white font-bold py-3.5 rounded-xl hover:bg-white/10 transition-all">
                تحديث الصفحة
            </button>
            <button onclick="logout()" class="w-full text-red-400 font-medium py-2 hover:text-red-300 transition-colors text-sm">
                تسجيل الخروج
            </button>
        </div>

    </div>

    <script>
        const userDataStr = localStorage.getItem('dahih_user');
        
        if (!userDataStr) {
            window.location.href = "/logina.html";
        } else {
            const user = JSON.parse(userDataStr);
            const firstName = user.name ? user.name.split(' ')[0] : "بطل";

            if (user.status === 'pending') {
                document.getElementById('pendingSection').classList.remove('hidden');
                document.getElementById('pendingName').innerText = firstName;
            } else if (user.status === 'rejected') {
                document.getElementById('rejectedSection').classList.remove('hidden');
                document.getElementById('rejectedName').innerText = firstName;
                if(user.reason && user.reason.trim() !== "") {
                    document.getElementById('rejectionReason').innerText = user.reason;
                }
            } else {
                // لو الحساب مقبول ودخل بالغلط هنا يرجعه للداشبورد
                window.location.href = "/dashboard.html";
            }
        }

        function checkAgain() {
            window.location.reload();
        }

        function logout() {
            localStorage.removeItem('dahih_user');
            window.location.href = "/logina.html";
        }
    </script>
</body>
</html>
