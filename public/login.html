<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول | منصة الدحيح</title>

<link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: 'Readex Pro', sans-serif; }
.bg-animated-gradient {
    background: linear-gradient(135deg, #070b19, #0f172a, #070b19, #1e1b4b);
    background-size: 400% 400%;
    animation: gradientMove 15s ease infinite;
}
@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
.glass-card {
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 30px 60px rgba(0,0,0,0.4);
}
.hidden-step { display:none; }
</style>
</head>

<body class="bg-animated-gradient text-white min-h-screen flex items-center justify-center p-6">

<div class="glass-card bg-white/5 w-full max-w-md rounded-[2.5rem] p-10 text-center">

<div class="text-4xl font-black text-yellow-500 mb-2">الدحيح<span class="text-white">.</span></div>
<p class="text-gray-400 text-sm mb-8">أدخل رقم جوالك للمتابعة بشكل آمن وسريع</p>

<div id="phone-container">
<input id="phone" type="tel" placeholder="+201000000000"
class="w-full bg-black/20 border border-white/10 rounded-xl px-4 py-3 mb-4 text-left"
dir="ltr">

<div id="recaptcha-container" class="mb-4 flex justify-center"></div>

<button id="sendBtn" onclick="sendCode()"
class="w-full bg-yellow-500 text-black font-bold py-3 rounded-xl hover:bg-yellow-400 transition">
إرسال رمز التحقق
</button>

<p id="phone-error" class="text-red-400 text-xs mt-3 hidden"></p>
</div>

<div id="otp-container" class="hidden-step">
<p class="text-sm text-green-400 mb-4">تم إرسال رمز التحقق</p>

<input id="code" type="text" maxlength="6" placeholder="••••••"
class="w-full text-center tracking-[0.5em] bg-black/20 border border-white/10 rounded-xl px-4 py-3 mb-4">

<button id="verifyBtn" onclick="verifyCode()"
class="w-full bg-green-500 py-3 rounded-xl font-bold">
تأكيد
</button>

<p id="otp-error" class="text-red-400 text-xs mt-3 hidden"></p>

<button onclick="resetAll()" class="text-xs text-gray-400 mt-4 hover:text-white">
تغيير الرقم
</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPhoneNumber, RecaptchaVerifier } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyDSQvaTzE73ua2U8eKKMT_shuQ_l52tpxU",
    authDomain: "eld7e7-63bfe.firebaseapp.com",
    projectId: "eld7e7-63bfe",
    storageBucket: "eld7e7-63bfe.firebasestorage.app",
    messagingSenderId: "124898726301",
    appId: "1:124898726301:web:49af90b841b8d7317e5f74"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
auth.languageCode = "ar";

let sending = false;

// reCAPTCHA
window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
    size: 'normal'
});

// إرسال الكود
window.sendCode = async function() {
    if (sending) return;

    const phone = document.getElementById("phone").value.trim();
    const error = document.getElementById("phone-error");

    if (!/^\+20\d{10}$/.test(phone)) {
        error.textContent = "يرجى إدخال رقم صحيح بصيغة +20XXXXXXXXXX";
        error.classList.remove("hidden");
        return;
    }

    error.classList.add("hidden");
    sending = true;

    const btn = document.getElementById("sendBtn");
    btn.innerText = "جارٍ الإرسال...";
    btn.disabled = true;

    try {
        const result = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
        window.confirmationResult = result;

        document.getElementById("phone-container").classList.add("hidden-step");
        document.getElementById("otp-container").classList.remove("hidden-step");
    } catch (e) {
        error.textContent = "تعذر إرسال الرمز. حاول مرة أخرى.";
        error.classList.remove("hidden");

        window.recaptchaVerifier.render().then(id => grecaptcha.reset(id));
    }

    btn.innerText = "إرسال رمز التحقق";
    btn.disabled = false;
    sending = false;
};

// تحقق الكود
window.verifyCode = async function() {
    const code = document.getElementById("code").value;
    const error = document.getElementById("otp-error");
    const btn = document.getElementById("verifyBtn");

    if (code.length !== 6) {
        error.textContent = "أدخل رمز مكون من 6 أرقام";
        error.classList.remove("hidden");
        return;
    }

    error.classList.add("hidden");
    btn.innerText = "جارٍ التحقق...";
    btn.disabled = true;

    try {
        const result = await window.confirmationResult.confirm(code);

        // نجاح
        document.body.innerHTML = `
        <div class="min-h-screen flex items-center justify-center text-center">
            <div>
                <h1 class="text-2xl font-bold text-green-400 mb-4">تم تسجيل الدخول بنجاح</h1>
                <p class="text-gray-400">مرحبًا بك</p>
            </div>
        </div>`;
    } catch (e) {
        error.textContent = "رمز غير صحيح أو منتهي";
        error.classList.remove("hidden");
    }

    btn.innerText = "تأكيد";
    btn.disabled = false;
};

// إعادة تعيين
window.resetAll = function() {
    location.reload();
};
</script>

</body>
</html>
