<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | منصة الدحيح</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            font-family: 'Readex Pro', sans-serif;
        }
        .bg-animated-gradient {
            background: linear-gradient(135deg, #070b19, #0f172a, #070b19, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass-card {
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body class="bg-animated-gradient text-white min-h-screen flex items-center justify-center p-6 selection:bg-yellow-500 selection:text-black">

    <div class="glass-card bg-white/5 w-full max-w-md rounded-[2.5rem] p-10 text-center relative overflow-hidden animate-fade-up">
        
        <div class="text-4xl font-black text-yellow-500 mb-2 tracking-tight">الدحيح<span class="text-white">.</span></div>
        <p class="text-gray-400 text-sm mb-10 font-light">سجل دخولك الفوري للمتابعة وحفظ درجاتك</p>

        <div class="flex flex-row gap-6 justify-center items-center mb-10">
            
            <button onclick="loginWithProvider('google')" class="p-5 rounded-full border-2 border-white/10 bg-white/5 hover:border-white hover:bg-white/10 transition-all duration-300 transform hover:scale-110 shadow-lg">
                <svg class="w-8 h-8" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M23.745 12.27c0-.7-.06-1.4-.19-2.07H12v3.92h6.61c-.29 1.5-1.14 2.78-2.4 3.63v3h3.84c2.24-2.06 3.53-5.1 3.53-8.48z"/>
                    <path fill="#34A853" d="M12 24c3.24 0 5.95-1.08 7.93-2.91l-3.84-3c-1.07.72-2.45 1.16-4.09 1.16-3.15 0-5.81-2.13-6.76-5.01H1.36v3.1A11.99 11.99 0 0 0 12 24z"/>
                    <path fill="#FBBC05" d="M5.24 14.24a7.2 7.2 0 0 1 0-4.48V6.66H1.36a11.99 11.99 0 0 0 0 10.68l3.88-3.1z"/>
                    <path fill="#EA4335" d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C17.95 1.19 15.24 0 12 0 7.31 0 3.28 2.68 1.36 6.66l3.88 3.1c.95-2.88 3.61-5.01 6.76-5.01z"/>
                </svg>
            </button>

            <button onclick="loginWithProvider('apple')" class="p-5 rounded-full border-2 border-white/10 bg-black/30 hover:border-white hover:bg-black/50 transition-all duration-300 transform hover:scale-110 shadow-lg">
                <svg class="w-8 h-8 fill-current text-white" viewBox="0 0 24 24">
                    <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.13.67-2.85 1.51-.62.73-1.16 1.87-1.01 2.98 1.1.09 2.15-.55 2.87-1.43z"/>
                </svg>
            </button>
            
        </div>

        <a href="/" class="text-sm text-gray-500 hover:text-white transition-colors block pb-2">العودة للرئيسية</a>

    </div>

    <script>
        function loginWithProvider(provider) {
            alert("تم تحديد طريقة التسجيل عبر: " + provider.toUpperCase() + "\nسيتم ربط هذا الزر بـ MongoDB عبر Cloudflare Function (api/questions.js) لحفظ الايميل بشكل آمن.");
        }
    </script>
</body>
</html>
