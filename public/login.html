<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050914">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>تسجيل الدخول | منصة الدحيح</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { scroll-behavior: smooth; }
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Readex Pro', sans-serif; overflow-x: hidden; overflow-y: auto; background-color: #050914; }
        
        .glass-card {
            backdrop-filter: blur(24px); 
            -webkit-backdrop-filter: blur(24px);
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255,255,255,0.1);
            position: relative;
            z-index: 2;
        }

        @keyframes premiumFadeUp {
            0% { opacity: 0; transform: translateY(30px) scale(0.98); filter: blur(8px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        .stagger-1 { opacity: 0; animation: premiumFadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards; }
        .stagger-2 { opacity: 0; animation: premiumFadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards; }
        .stagger-3 { opacity: 0; animation: premiumFadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards; }
        .stagger-4 { opacity: 0; animation: premiumFadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards; }
        .stagger-5 { opacity: 0; animation: premiumFadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards; }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .shake-animation {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        .input-error { border-color: #ef4444 !important; box-shadow: 0 0 15px rgba(239, 68, 68, 0.2) !important; }

        @media (prefers-reduced-motion: reduce) {
            .stagger-1, .stagger-2, .stagger-3, .stagger-4, .stagger-5, .shake-animation { animation: none !important; opacity: 1 !important; transform: none !important; filter: none !important; }
        }

        .input-glow:focus {
            box-shadow: 0 0 20px rgba(234, 179, 8, 0.15), inset 0 2px 4px rgba(0,0,0,0.4);
        }
    </style>
</head>

<body class="text-white min-h-screen flex items-center justify-center p-6 relative">

    <svg width="0" height="0" class="hidden">
        <defs>
            <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#FDE047" />
                <stop offset="50%" stop-color="#EAB308" />
                <stop offset="100%" stop-color="#A16207" />
            </linearGradient>
            <filter id="soft3D">
                <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#A16207" flood-opacity="0.4"/>
                <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000" flood-opacity="0.6"/>
            </filter>
        </defs>
    </svg>

    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_rgba(234,179,8,0.12)_0%,_rgba(5,9,20,1)_70%)] pointer-events-none z-0"></div>
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-yellow-600/10 blur-[100px] rounded-full pointer-events-none z-0"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-600/5 blur-[120px] rounded-full pointer-events-none z-0"></div>

    <div id="loginCard" class="glass-card w-full max-w-md rounded-[2.5rem] p-10 relative overflow-hidden stagger-1 my-auto">
        
        <div class="text-center mb-10 stagger-2">
            <div class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-b from-yellow-300 via-yellow-500 to-yellow-700 drop-shadow-[0_0_20px_rgba(234,179,8,0.4)] mb-3 tracking-tighter">
                الدحيح<span class="text-white drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]">.</span>
            </div>
            <h2 class="text-2xl font-bold mt-2 mb-1 text-white/90">تسجيل الدخول</h2>
            <p class="text-gray-400/80 text-sm font-light">سجل دخولك بواسطة البريد أو رقم الهاتف</p>
        </div>

        <form id="loginForm">

            <div class="mb-5 stagger-3">
                <label class="block text-xs font-semibold text-gray-300/80 mb-2 flex justify-between tracking-wide">
                    <span>البريد أو رقم الهاتف</span>
                </label>
                <div class="relative">
                    <svg class="w-6 h-6 absolute right-4 top-1/2 -translate-y-1/2 z-10 pointer-events-none" viewBox="0 0 24 24">
                        <path fill="url(#goldGrad)" filter="url(#soft3D)" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 4c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm0 14c-2.64 0-5.05-1.04-6.82-2.73.04-2.26 4.54-3.5 6.82-3.5 2.27 0 6.78 1.24 6.82 3.5C17.05 18.96 14.64 20 12 20z"/>
                    </svg>
                    <input type="text" id="loginIdentifier" required autocomplete="username" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="example@mail.com أو 010..."
                        class="w-full bg-black/40 border border-white/5 text-white placeholder-gray-600/70 rounded-2xl pr-12 pl-4 py-4 focus:outline-none focus:border-yellow-500/50 focus:ring-2 focus:ring-yellow-500/20 transition-all duration-300 text-right input-glow shadow-[inset_0_2px_4px_rgba(0,0,0,0.3)]"
                        dir="ltr">
                </div>
            </div>

            <div class="mb-8 stagger-4">
                <label class="block text-xs font-semibold text-gray-300/80 mb-2 flex justify-between tracking-wide">
                    <span>كلمة السر</span>
                </label>
                <div class="relative">
                    <svg class="w-6 h-6 absolute right-4 top-1/2 -translate-y-1/2 z-10 pointer-events-none" viewBox="0 0 24 24">
                        <path fill="url(#goldGrad)" filter="url(#soft3D)" d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                    </svg>
                    
                    <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••"
                        class="w-full bg-black/40 border border-white/5 text-white placeholder-gray-600/70 rounded-2xl pr-12 pl-12 py-4 focus:outline-none focus:border-yellow-500/50 focus:ring-2 focus:ring-yellow-500/20 transition-all duration-300 text-right input-glow shadow-[inset_0_2px_4px_rgba(0,0,0,0.3)]"
                        dir="ltr">
                    
                    <button type="button" id="togglePassword" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 hover:scale-110 hover:text-yellow-400 transition-all duration-300 p-2 z-10" aria-label="إظهار/إخفاء كلمة المرور">
                        <svg id="eyeIcon" class="w-6 h-6" viewBox="0 0 24 24">
                            <path fill="url(#goldGrad)" filter="url(#soft3D)" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-gradient-to-t from-yellow-600 to-yellow-400 text-black font-extrabold text-lg py-4 rounded-2xl transition-all duration-300 shadow-[0_10px_20px_-5px_rgba(234,179,8,0.4),inset_0_-4px_0_rgba(161,98,7,0.6),inset_0_2px_4px_rgba(255,255,255,0.4)] hover:shadow-[0_15px_30px_-5px_rgba(234,179,8,0.6),inset_0_-4px_0_rgba(161,98,7,0.6),inset_0_2px_4px_rgba(255,255,255,0.4)] hover:-translate-y-1 active:translate-y-0 active:shadow-[0_0px_0px_rgba(234,179,8,0.0),inset_0_4px_8px_rgba(161,98,7,0.6)] flex items-center justify-center stagger-5">
                <span id="btnText">تسجيل الدخول</span>
            </button>

            <div class="mt-8 text-center stagger-5">
                <p class="text-gray-400/80 text-sm">معندكش حساب؟ 
                    <a href="/register.html" class="text-yellow-500 font-bold hover:text-yellow-400 hover:drop-shadow-[0_0_8px_rgba(234,179,8,0.5)] transition-all">اضغط هنا</a>
                </p>
            </div>

            <p id="successMessage" class="text-green-400 font-medium text-sm text-center mt-6 hidden p-3 bg-green-400/10 border border-green-400/20 rounded-xl backdrop-blur-md"></p>
            <p id="errorMessage" class="text-red-400 font-medium text-sm text-center mt-6 hidden p-3 bg-red-400/10 border border-red-400/20 rounded-xl backdrop-blur-md"></p>

        </form>
    </div>

<script>
async function verifySession() {
    const token = localStorage.getItem('userToken');
    if (!token) return;
    try {
        const res = await fetch('/api/verify-session', { headers: { 'Authorization': `Bearer ${token}` } });
        let data = {}; try { data = await res.json(); } catch (_) { data = {}; }
        if (res.ok && data.redirectTo) window.location.replace(data.redirectTo);
        if (['TOKEN_EXPIRED', 'TOKEN_INVALID', 'ACCOUNT_NOT_FOUND'].includes(data.code)) {
            ['userToken', 'dahih_token', 'userData', 'dahih_user'].forEach(k => localStorage.removeItem(k));
        }
    } catch (e) {
        console.warn('Session verification failed');
    }
}
verifySession();

const toggleBtn = document.getElementById('togglePassword');
const passwordInput = document.getElementById('password');
const eyeIcon = document.getElementById('eyeIcon');
const loginIdentifierInput = document.getElementById('loginIdentifier');
const formContainer = document.getElementById('loginForm');
const btn = document.getElementById('submitBtn');
const btnText = document.getElementById('btnText');
const errorMsg = document.getElementById('errorMessage');
const successMsg = document.getElementById('successMessage');

toggleBtn.onclick = () => {
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.innerHTML = '<path fill="url(#goldGrad)" filter="url(#soft3D)" d="M11.83 9L15 12.16V12a3 3 0 0 0-3-3h-.17zm-4.3.8l1.55 1.55c-.05.21-.08.43-.08.65a3 3 0 0 0 3 3c.22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.47-5.3c3.4 0 6.46 1.81 8.24 4.5a10.05 10.05 0 0 1-2.02 2.28l-2.09-2.09A5.02 5.02 0 0 0 12 7a4.98 4.98 0 0 0-3.34 1.3L6.5 6.13A9.95 9.95 0 0 1 12 4.5zM2 4.27l2.28 2.28.46.46A11.8 11.8 0 0 0 1 12c1.78 2.69 4.84 4.5 8.24 4.5 1.48 0 2.89-.3 4.16-.83l.59.59L17.73 20l1.41-1.41L3.41 2.86 2 4.27z"/>';
    } else {
        passwordInput.type = 'password';
        eyeIcon.innerHTML = '<path fill="url(#goldGrad)" filter="url(#soft3D)" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
    }
};

function setLoading(state) {
    if (state) {
        btnText.innerHTML = `
            <span class="flex items-center gap-3">
                <svg class="animate-spin h-6 w-6 border-4 border-black/20 border-t-black rounded-full" viewBox="0 0 24 24"></svg>
                جاري التحقق...
            </span>
        `;
        btn.disabled = true;
        btn.style.opacity = "0.8";
        btn.style.transform = "translateY(0)";
        btn.style.boxShadow = "inset 0 4px 8px rgba(161,98,7,0.6)";
    } else {
        btnText.innerText = "تسجيل الدخول";
        btn.disabled = false;
        btn.style.opacity = "1";
        btn.style.boxShadow = "";
    }
}

function showError(msg) {
    errorMsg.innerText = msg;
    errorMsg.classList.remove('hidden');
    successMsg.classList.add('hidden');
    formContainer.classList.remove('shake-animation');
    void formContainer.offsetWidth;
    formContainer.classList.add('shake-animation');
    loginIdentifierInput.classList.add('input-error');
    passwordInput.classList.add('input-error');
    setTimeout(() => { loginIdentifierInput.classList.remove('input-error'); passwordInput.classList.remove('input-error'); }, 1500);
}

function showSuccess(msg) {
    successMsg.innerText = msg;
    successMsg.classList.remove('hidden');
    errorMsg.classList.add('hidden');
}

formContainer.addEventListener('submit', async (event) => {
    event.preventDefault();
    if (btn.disabled) return;
    const identifier = loginIdentifierInput.value.trim();
    const passwordVal = passwordInput.value;
    if (!identifier || passwordVal.length < 4) { showError("تأكد من البيانات"); return; }

    setLoading(true);
    try {
        const response = await fetch('/api/saveUser', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ identifier, password: passwordVal })
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(result.message || "خطأ في الاتصال");
        
        showSuccess("تم بنجاح");
        setLoading(false);
        if (result.token) { localStorage.setItem('userToken', result.token); localStorage.setItem('dahih_token', result.token); }
        if (result.userData) { localStorage.setItem('userData', JSON.stringify(result.userData)); localStorage.setItem('dahih_user', JSON.stringify(result.userData)); }
        setTimeout(() => {
            const r = result.userData?.role;
            const s = result.userData?.status;
            window.location.replace((r === 'dev' || r === 'owner') ? "/admin.html" : (s === 'pending' || s === 'rejected') ? "/status.html" : "/student/");
        }, 1000);
    } catch (e) { showError(e.message); setLoading(false); }
});
</script>
</body>
</html>
